# ========================================
# Redis Sentinel Configuration for KitchenXpert
# ========================================
# Production-ready Redis Sentinel for High Availability
# Based on Redis 6.0+
#
# Redis Sentinel provides:
# - Monitoring: Check if master and replicas are working
# - Notification: Notify admins about failures
# - Automatic failover: Promote replica to master on failure
# - Configuration provider: Clients ask Sentinel for current master
#
# Minimum setup: 3 Sentinel instances (prevents split-brain)
#
# Usage:
#   redis-sentinel /path/to/sentinel.conf
#   or: redis-server /path/to/sentinel.conf --sentinel

# ----------------------------------------
# General Settings
# ----------------------------------------
# Port for this Sentinel instance
port 26379

# Run as daemon (yes/no)
daemonize no

# Supervised by systemd
supervised systemd

# PID file location
pidfile /var/run/redis/redis-sentinel.pid

# Log file location (empty string = stdout)
logfile /var/log/redis/redis-sentinel.log

# Directory for Sentinel's state persistence
dir /var/lib/redis

# ----------------------------------------
# Monitoring Configuration
# ----------------------------------------
# Monitor a master Redis instance
# Format: sentinel monitor <master-name> <ip> <port> <quorum>
#
# master-name: Arbitrary name for this master (used in failover)
# ip: IP address of the Redis master
# port: Port of the Redis master
# quorum: Number of Sentinels that need to agree about failure
#         For 3 Sentinels, use quorum 2
#         For 5 Sentinels, use quorum 3

sentinel monitor kitchenxpert-master 127.0.0.1 6379 2

# ----------------------------------------
# Master Authentication
# ----------------------------------------
# Password to authenticate with master and replicas
# IMPORTANT: Set this if Redis instances have requirepass
sentinel auth-pass kitchenxpert-master ${REDIS_PASSWORD}

# ----------------------------------------
# Failure Detection
# ----------------------------------------
# Time in milliseconds before marking instance as down
# If master doesn't respond for this time, it's marked as subjectively down
# Default: 30000 (30 seconds)
sentinel down-after-milliseconds kitchenxpert-master 5000

# ----------------------------------------
# Failover Configuration
# ----------------------------------------
# Number of replicas that can sync with new master simultaneously
# Lower value = safer but slower recovery
# Higher value = faster recovery but more load
# Recommended: 1 for production
sentinel parallel-syncs kitchenxpert-master 1

# Timeout for failover operation (milliseconds)
# If failover takes longer than this, it's considered failed
# Should be at least 3 times down-after-milliseconds
sentinel failover-timeout kitchenxpert-master 10000

# ----------------------------------------
# Notification Scripts
# ----------------------------------------
# Execute scripts on specific events

# Script to run when Sentinel generates a warning level event
# sentinel notification-script kitchenxpert-master /var/redis/notify.sh

# Script to reconfigure clients after failover
# Arguments passed: <master-name> <role> <state> <from-ip> <from-port> <to-ip> <to-port>
# sentinel client-reconfig-script kitchenxpert-master /var/redis/reconfig.sh

# ----------------------------------------
# Sentinel Connection Settings
# ----------------------------------------
# Deny dangerous commands to Sentinel
# sentinel deny-scripts-reconfig yes

# Protected mode (only accept connections from localhost)
protected-mode no

# Bind Sentinel to specific addresses
# bind 127.0.0.1 192.168.1.10

# Require password for Sentinel API
# requirepass ${SENTINEL_PASSWORD}

# ----------------------------------------
# Replica Priority and Selection
# ----------------------------------------
# When selecting new master, Sentinels prefer replicas with:
# 1. Lower replica-priority value (configure in redis.conf)
# 2. Higher replication offset (most up-to-date data)
# 3. Lexicographically smaller Run ID (tie-breaker)

# Minimum number of good replicas for failover to proceed
# If fewer good replicas, failover is not triggered
# sentinel min-replicas-to-write kitchenxpert-master 1

# Maximum lag for replica to be considered "good"
# sentinel min-replicas-max-lag kitchenxpert-master 10

# ----------------------------------------
# Advanced Settings
# ----------------------------------------
# Announce IP and port (useful for NAT/Docker)
# sentinel announce-ip 192.168.1.10
# sentinel announce-port 26379

# Connection limits
# sentinel max-clients 10000

# ----------------------------------------
# TLS/SSL Configuration
# ----------------------------------------
# Enable TLS for Sentinel
# port 0
# tls-port 26379
# tls-cert-file /path/to/sentinel.crt
# tls-key-file /path/to/sentinel.key
# tls-ca-cert-file /path/to/ca.crt
# tls-replication yes

# ----------------------------------------
# Example Multi-Sentinel Setup
# ----------------------------------------
# Deploy 3 Sentinel instances for high availability
#
# Sentinel 1: server1:26379
# Sentinel 2: server2:26379
# Sentinel 3: server3:26379
#
# All monitoring the same master with quorum 2
#
# Redis Topology:
# Master: redis-master:6379
# Replica 1: redis-replica-1:6379
# Replica 2: redis-replica-2:6379
#
# Configuration for each Sentinel:
# sentinel monitor kitchenxpert-master <master-ip> 6379 2
# sentinel down-after-milliseconds kitchenxpert-master 5000
# sentinel parallel-syncs kitchenxpert-master 1
# sentinel failover-timeout kitchenxpert-master 10000

# ----------------------------------------
# Monitoring Multiple Masters
# ----------------------------------------
# You can monitor multiple Redis masters with one Sentinel
# Just add more "sentinel monitor" directives
#
# Example:
# sentinel monitor master1 192.168.1.10 6379 2
# sentinel monitor master2 192.168.1.20 6379 2
# sentinel down-after-milliseconds master1 5000
# sentinel down-after-milliseconds master2 5000

# ----------------------------------------
# Production Recommendations
# ----------------------------------------
# 1. Deploy at least 3 Sentinel instances (odd number)
# 2. Set quorum to majority (N/2 + 1)
# 3. Sentinels should be on different physical/virtual machines
# 4. Use same configuration on all Sentinels
# 5. Monitor Sentinel health with external monitoring
# 6. Set down-after-milliseconds based on network latency
# 7. Test failover regularly in staging environment
# 8. Set up notification scripts for alerts
# 9. Use client-reconfig-script to update load balancers
# 10. Enable TLS for secure communication
# 11. Set requirepass for Sentinel API security
# 12. Review logs regularly for failover events
# 13. Ensure proper firewall rules (allow Sentinel ports)
# 14. Document failover procedures
# 15. Keep Sentinel and Redis versions in sync

# ----------------------------------------
# Client Configuration
# ----------------------------------------
# Application clients should connect to Sentinel, not directly to Redis
#
# Example Node.js (ioredis):
# const Redis = require('ioredis');
# const redis = new Redis({
#   sentinels: [
#     { host: 'sentinel1', port: 26379 },
#     { host: 'sentinel2', port: 26379 },
#     { host: 'sentinel3', port: 26379 }
#   ],
#   name: 'kitchenxpert-master',
#   password: 'redis-password'
# });

# ----------------------------------------
# Sentinel Commands
# ----------------------------------------
# Useful Sentinel commands:
#
# SENTINEL masters
#   - List all monitored masters
#
# SENTINEL master <master-name>
#   - Show info about specific master
#
# SENTINEL replicas <master-name>
#   - Show all replicas of master
#
# SENTINEL sentinels <master-name>
#   - Show all Sentinels monitoring this master
#
# SENTINEL get-master-addr-by-name <master-name>
#   - Get current master address
#
# SENTINEL failover <master-name>
#   - Force manual failover
#
# SENTINEL reset <pattern>
#   - Reset master state (use with caution!)
#
# SENTINEL ckquorum <master-name>
#   - Check if quorum is reachable
#
# SENTINEL flushconfig
#   - Force rewrite of Sentinel configuration

# ----------------------------------------
# Health Check
# ----------------------------------------
# Check Sentinel status:
# redis-cli -p 26379 PING
# redis-cli -p 26379 SENTINEL masters
# redis-cli -p 26379 SENTINEL get-master-addr-by-name kitchenxpert-master

# ----------------------------------------
# Logging
# ----------------------------------------
# Sentinel logs important events:
# - +monitor: Started monitoring master
# - +sdown: Subjectively down (this Sentinel thinks it's down)
# - +odown: Objectively down (quorum reached, master is down)
# - +failover-triggered: Failover initiated
# - +failover-state-select-slave: Selecting new master
# - +selected-slave: New master selected
# - +failover-state-send-slaveof-noone: Promoting replica
# - +failover-end: Failover completed
# - +switch-master: Master address changed

# Review logs regularly to ensure healthy operation
