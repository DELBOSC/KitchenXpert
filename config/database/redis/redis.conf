# ========================================
# Redis Configuration for KitchenXpert
# ========================================
# Production-ready Redis configuration
# Based on Redis 6.0+
#
# IMPORTANT: This is a custom configuration optimized for KitchenXpert
# Adjust settings based on your hardware and requirements
#
# Apply changes: sudo systemctl restart redis
# or: redis-server /path/to/redis.conf

# ----------------------------------------
# Network Settings
# ----------------------------------------
# Bind to specific IP addresses
# 127.0.0.1 for local only, 0.0.0.0 for all interfaces (NOT RECOMMENDED)
# In production, bind to specific IPs for security
bind 127.0.0.1

# Accept connections on the specified port
port 6379

# TCP listen() backlog
# Higher values needed for many simultaneous connections
tcp-backlog 511

# Close connection after client idle for N seconds (0 to disable)
timeout 300

# TCP keepalive
# Send TCP ACKs to clients every N seconds (0 to disable)
tcp-keepalive 300

# ----------------------------------------
# General Settings
# ----------------------------------------
# Run as daemon (yes/no)
# Set to yes for production, no for Docker/systemd
daemonize no

# Supervised by systemd/upstart/auto (no for manual)
supervised systemd

# PID file (if daemonize is yes)
pidfile /var/run/redis/redis-server.pid

# Log level: debug, verbose, notice, warning
loglevel notice

# Log file location (empty string = stdout)
logfile /var/log/redis/redis-server.log

# Number of databases (0-15 by default)
databases 16

# Show Redis logo on startup
always-show-logo no

# ----------------------------------------
# Snapshotting (RDB Persistence)
# ----------------------------------------
# Save the DB to disk
# Format: save <seconds> <changes>
# Save if at least N keys changed in M seconds

# Save after 1 hour if at least 1 key changed
save 3600 1

# Save after 5 minutes if at least 100 keys changed
save 300 100

# Save after 1 minute if at least 10000 keys changed
save 60 10000

# Stop accepting writes if RDB snapshots fail
stop-writes-on-bgsave-error yes

# Compress string objects using LZF
rdbcompression yes

# Checksum RDB files
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Directory where RDB and AOF files are written
dir /var/lib/redis

# ----------------------------------------
# Replication (if using master/replica)
# ----------------------------------------
# Replica of master (uncomment and configure for replica)
# replicaof <masterip> <masterport>

# Authentication password for master
# masterauth <master-password>

# Serve stale data when replica loses connection to master
replica-serve-stale-data yes

# Read-only replica
replica-read-only yes

# Replication sync strategy: disk or socket
repl-diskless-sync no

# Delay diskless sync to wait for more replicas
repl-diskless-sync-delay 5

# Disable TCP_NODELAY on replica socket
repl-disable-tcp-nodelay no

# Replica priority for failover (lower = higher priority)
replica-priority 100

# ----------------------------------------
# Security
# ----------------------------------------
# Require password for connections
# IMPORTANT: Set this in production!
# Get password from environment variable
requirepass ${REDIS_PASSWORD}

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG "CONFIG_67890abcdef"

# ACL (Access Control List) file
# aclfile /etc/redis/users.acl

# ----------------------------------------
# Memory Management
# ----------------------------------------
# Maximum memory limit (in bytes)
# Recommend: 256MB for cache, adjust based on your needs
maxmemory 256mb

# Eviction policy when maxmemory is reached
# Options:
#   noeviction: return errors when memory limit reached
#   allkeys-lru: evict least recently used keys
#   allkeys-lfu: evict least frequently used keys
#   volatile-lru: evict LRU keys with expire set
#   volatile-lfu: evict LFU keys with expire set
#   allkeys-random: evict random keys
#   volatile-random: evict random keys with expire set
#   volatile-ttl: evict keys with nearest expire time
maxmemory-policy allkeys-lru

# LRU/LFU sample size
maxmemory-samples 5

# Evict expired keys proactively
# activerehashing yes

# ----------------------------------------
# Append-Only File (AOF Persistence)
# ----------------------------------------
# Enable AOF (more durable than RDB)
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF sync strategy
# Options:
#   always: fsync every write (slow, safest)
#   everysec: fsync every second (good balance)
#   no: let OS decide when to fsync (fastest, least safe)
appendfsync everysec

# Don't fsync during rewrite to avoid blocking
no-appendfsync-on-rewrite no

# Automatic AOF rewrite configuration
# Rewrite when AOF is 100% bigger than base size
auto-aof-rewrite-percentage 100

# Minimum size to trigger rewrite
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup
aof-load-truncated yes

# Use RDB preamble in AOF for faster loading
aof-use-rdb-preamble yes

# ----------------------------------------
# Lua Scripting
# ----------------------------------------
# Max execution time for Lua scripts (milliseconds)
lua-time-limit 5000

# ----------------------------------------
# Slow Log
# ----------------------------------------
# Log queries slower than N microseconds
# 1000000 microseconds = 1 second
slowlog-log-slower-than 10000

# Maximum length of slow log
slowlog-max-len 128

# ----------------------------------------
# Latency Monitoring
# ----------------------------------------
# Track latency events exceeding threshold (milliseconds)
latency-monitor-threshold 100

# ----------------------------------------
# Event Notification
# ----------------------------------------
# Keyspace notifications
# K: keyspace events (e.g., del, expire, set)
# E: keyevent events (e.g., expired, evicted)
# g: generic commands (del, expire, etc.)
# $: string commands
# l: list commands
# s: set commands
# h: hash commands
# z: sorted set commands
# x: expired events
# e: evicted events
# A: alias for "g$lshzxe"
#
# Example: "Ex" = expired and evicted events
notify-keyspace-events ""

# ----------------------------------------
# Advanced Config
# ----------------------------------------
# Hash optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List optimization (use quicklist)
# Quicklist is a hybrid of ziplist and linked list

# Set optimization
set-max-intset-entries 512

# Sorted set optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog sparse representation
hll-sparse-max-bytes 3000

# Streams optimization
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
# Format: client-output-buffer-limit <class> <hard> <soft> <seconds>
# class: normal, replica, pubsub
# hard: hard limit (disconnect immediately)
# soft: soft limit (disconnect if exceeded for N seconds)

# Normal clients
client-output-buffer-limit normal 0 0 0

# Replica clients
client-output-buffer-limit replica 256mb 64mb 60

# Pub/Sub clients
client-output-buffer-limit pubsub 32mb 8mb 60

# Client query buffer limit
# client-query-buffer-limit 1gb

# Protocol buffer limit
# proto-max-bulk-len 512mb

# Frequency of background tasks
hz 10

# Enable dynamic hz (1-500)
dynamic-hz yes

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB save incremental fsync
rdb-save-incremental-fsync yes

# ----------------------------------------
# Threaded I/O (Redis 6.0+)
# ----------------------------------------
# Number of I/O threads
# Set to number of CPU cores (but not more than 8)
# io-threads 4

# Enable I/O threads for reads
# io-threads-do-reads no

# ----------------------------------------
# TLS/SSL (if needed)
# ----------------------------------------
# Enable TLS
# port 0
# tls-port 6379
# tls-cert-file /path/to/redis.crt
# tls-key-file /path/to/redis.key
# tls-ca-cert-file /path/to/ca.crt
# tls-auth-clients no
# tls-replication yes
# tls-cluster yes

# ----------------------------------------
# Cluster Mode (if using Redis Cluster)
# ----------------------------------------
# Enable cluster mode
# cluster-enabled yes
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000
# cluster-replica-validity-factor 10
# cluster-migration-barrier 1
# cluster-require-full-coverage yes

# ----------------------------------------
# KitchenXpert Specific Settings
# ----------------------------------------
# Session keys expire after 7 days
# maxmemory-policy volatile-lru

# Keyspace prefix convention:
# session:<session_id> - User sessions
# cache:catalog:<item_id> - Catalog item cache
# cache:project:<project_id> - Project cache
# cache:ai:<suggestion_id> - AI suggestions cache
# queue:<queue_name> - Job queues
# lock:<resource_name> - Distributed locks
# ratelimit:<user_id>:<endpoint> - Rate limiting

# ----------------------------------------
# Production Recommendations
# ----------------------------------------
# 1. Set requirepass to strong random password
# 2. Enable AOF persistence for durability
# 3. Set maxmemory based on available RAM
# 4. Use allkeys-lru eviction policy for cache
# 5. Monitor slow queries with SLOWLOG
# 6. Set up replication for high availability
# 7. Use Redis Sentinel for automatic failover
# 8. Regular backups of RDB and AOF files
# 9. Monitor memory usage and evictions
# 10. Disable dangerous commands (FLUSHALL, KEYS, etc.)
# 11. Use TLS for network encryption
# 12. Restrict network access with firewall
# 13. Run Redis as non-root user
# 14. Set vm.overcommit_memory = 1 in /etc/sysctl.conf
# 15. Disable transparent huge pages

# ----------------------------------------
# Monitoring Commands
# ----------------------------------------
# INFO - Server statistics
# SLOWLOG GET - Slow queries
# CLIENT LIST - Connected clients
# MEMORY STATS - Memory usage
# LATENCY DOCTOR - Latency diagnostics
# CONFIG GET * - Current configuration
