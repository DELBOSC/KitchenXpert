# ========================================
# PostgreSQL Configuration for KitchenXpert
# ========================================
# Production-ready PostgreSQL tuning for optimal performance
# Based on PostgreSQL 14+
#
# IMPORTANT: Adjust settings based on your hardware:
# - RAM: 4GB+ recommended
# - CPU: 4+ cores recommended
# - Storage: SSD strongly recommended
#
# Apply changes: pg_ctl reload or systemctl reload postgresql

# ----------------------------------------
# Connection Settings
# ----------------------------------------
# Maximum number of concurrent connections
# Rule of thumb: (RAM in GB * 100) but cap at 200-400 for most apps
max_connections = 200

# Connections reserved for superuser emergency access
superuser_reserved_connections = 3

# Listen on all interfaces (restrict with pg_hba.conf)
# For production, specify exact IPs instead of '*'
listen_addresses = '*'

# Port number
port = 5432

# Maximum time to complete client authentication (30s)
authentication_timeout = 30s

# TCP keepalive settings
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# ----------------------------------------
# Memory Settings
# ----------------------------------------
# Shared memory buffer - 25% of RAM for dedicated DB server
# For 4GB RAM: 1GB, For 8GB RAM: 2GB, For 16GB RAM: 4GB
shared_buffers = 256MB

# Memory for complex sorts and hash tables (per operation)
# Multiply by max_connections to get total potential usage
# 4MB * 200 = 800MB potential usage
work_mem = 4MB

# Memory for maintenance operations (VACUUM, CREATE INDEX, etc.)
# Set higher than work_mem (16-64x)
maintenance_work_mem = 128MB

# Total memory for autovacuum workers
# Should be at least autovacuum_max_workers * maintenance_work_mem
autovacuum_work_mem = -1  # Use maintenance_work_mem value

# Planner estimate of cache available to OS and PostgreSQL
# Should be about 50-75% of total RAM
effective_cache_size = 1GB

# Shared memory for temporary tables
# -1 means unlimited (uses temp_tablespaces instead)
temp_buffers = 8MB

# ----------------------------------------
# Write-Ahead Logging (WAL)
# ----------------------------------------
# WAL level - 'replica' required for replication
# Options: minimal, replica, logical
wal_level = replica

# Enable fsync for data integrity (NEVER disable in production!)
fsync = on

# Synchronous commit - trade durability for performance
# on: safest (default), off: fastest, local: balanced
synchronous_commit = on

# WAL buffer size - amount of WAL data buffered before write
# -1 means auto-size (1/32 of shared_buffers, max 16MB)
wal_buffers = -1

# WAL segment size (16MB default, must match initdb settings)
# wal_segment_size = 16MB  # Read-only parameter

# Time between WAL flushes (milliseconds)
# Lower = more frequent writes, more safety, less performance
wal_writer_delay = 200ms

# Checkpoint settings - when to write dirty buffers to disk
# Maximum time between automatic checkpoints
checkpoint_timeout = 5min

# Checkpoint when WAL reaches this size
max_wal_size = 1GB

# Minimum WAL size to keep
min_wal_size = 80MB

# Fraction of checkpoint_timeout to spread checkpoint I/O
# 0.9 means spread over 4.5 minutes (if checkpoint_timeout=5min)
checkpoint_completion_target = 0.9

# Archive WAL files for point-in-time recovery (PITR)
# archive_mode = on
# archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
# archive_timeout = 1h

# ----------------------------------------
# Replication (if using streaming replication)
# ----------------------------------------
# Maximum number of concurrent connections from standby servers
max_wal_senders = 10

# Maximum number of replication slots
max_replication_slots = 10

# Keep WAL for potential standbys
wal_keep_size = 128MB

# Timeout for replication connection
wal_sender_timeout = 60s

# Standby server can connect even during exclusive backup
# hot_standby = on

# Maximum delay before applying WAL on standby (for read queries)
# max_standby_streaming_delay = 30s

# ----------------------------------------
# Query Planning
# ----------------------------------------
# Planner cost constants (defaults usually fine)
# Adjust based on hardware: SSD vs HDD, CPU speed, etc.
random_page_cost = 1.1        # For SSD (default 4.0 for HDD)
effective_io_concurrency = 200  # For SSD (default 1 for HDD)

# Parallel query settings (PostgreSQL 9.6+)
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_worker_processes = 8

# Cost threshold for parallel operations
parallel_setup_cost = 1000.0
parallel_tuple_cost = 0.1

# ----------------------------------------
# Logging
# ----------------------------------------
# Where to log
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = off

# When to log
log_min_messages = warning           # Server messages
log_min_error_statement = error      # Also log failed queries
log_min_duration_statement = 1000    # Log queries slower than 1s (milliseconds)

# What to log
log_connections = on
log_disconnections = on
log_duration = off                   # Don't log all query durations (use log_min_duration)
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_statement = 'none'               # none, ddl, mod, all
log_temp_files = 0                   # Log temp files over 0 bytes

# Lock waits and deadlocks
log_lock_waits = on
deadlock_timeout = 1s

# Auto-explain expensive queries
# shared_preload_libraries = 'auto_explain'
# auto_explain.log_min_duration = 1000  # Log plans for queries > 1s
# auto_explain.log_analyze = true
# auto_explain.log_buffers = true

# ----------------------------------------
# Statistics
# ----------------------------------------
# Track activity and collect statistics
track_activities = on
track_activity_query_size = 1024
track_counts = on
track_io_timing = on                 # Enables pg_stat_statements I/O timing
track_functions = pl                 # none, pl, all

# Statistics target - higher = better estimates, slower ANALYZE
default_statistics_target = 100

# ----------------------------------------
# Autovacuum
# ----------------------------------------
# Automatically clean up dead tuples
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min

# Vacuum when 20% of table changed or 50 rows
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.2

# Analyze when 10% of table changed or 50 rows
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.1

# Cost-based delay to avoid overwhelming system
autovacuum_vacuum_cost_delay = 20ms
autovacuum_vacuum_cost_limit = 200

# ----------------------------------------
# Client Connection Defaults
# ----------------------------------------
# Locale and formatting
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# Default text search configuration
default_text_search_config = 'pg_catalog.english'

# Character encoding
client_encoding = 'UTF8'

# ----------------------------------------
# Lock Management
# ----------------------------------------
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64

# ----------------------------------------
# Statement Timeout
# ----------------------------------------
# Abort any statement that takes more than specified time
# 0 = disabled (default), 60000 = 1 minute
statement_timeout = 0

# Abort any idle transaction (in a transaction block)
# 0 = disabled, 300000 = 5 minutes
idle_in_transaction_session_timeout = 600000  # 10 minutes

# ----------------------------------------
# Error Handling
# ----------------------------------------
# Restart after backend crash
restart_after_crash = on

# ----------------------------------------
# Extensions
# ----------------------------------------
# Load shared libraries on server start
# shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements settings (if loaded)
# pg_stat_statements.max = 10000
# pg_stat_statements.track = all

# ----------------------------------------
# Custom Settings (KitchenXpert-specific)
# ----------------------------------------
# Application name for connection tracking
# application_name = 'kitchenxpert'

# ----------------------------------------
# Security (combine with pg_hba.conf)
# ----------------------------------------
# SSL configuration
# ssl = on
# ssl_cert_file = '/path/to/server.crt'
# ssl_key_file = '/path/to/server.key'
# ssl_ca_file = '/path/to/root.crt'
# ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'
# ssl_prefer_server_ciphers = on

# Password encryption method
password_encryption = scram-sha-256

# Row-level security
row_security = on

# ----------------------------------------
# Notes for Production Tuning
# ----------------------------------------
# 1. Adjust shared_buffers based on available RAM
# 2. Set effective_cache_size to ~75% of total RAM
# 3. Lower random_page_cost for SSDs (1.1) vs HDDs (4.0)
# 4. Monitor slow queries with log_min_duration_statement
# 5. Enable pg_stat_statements for query analysis
# 6. Regular VACUUM ANALYZE for table statistics
# 7. Monitor with pg_stat_user_tables and pg_stat_bgwriter
# 8. Use connection pooling (PgBouncer) for many clients
# 9. Set up replication for high availability
# 10. Configure regular backups with pg_basebackup or WAL archiving
