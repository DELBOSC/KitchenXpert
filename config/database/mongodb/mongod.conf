# ========================================
# MongoDB Configuration for KitchenXpert
# ========================================
# Production-ready MongoDB configuration
# Based on MongoDB 5.0+
#
# IMPORTANT: Adjust settings based on your hardware and requirements
# This configuration uses YAML format
#
# Apply changes: sudo systemctl restart mongod
# or: mongod --config /path/to/mongod.conf

# ----------------------------------------
# Network Settings
# ----------------------------------------
net:
  # Port MongoDB listens on
  port: 27017

  # Bind to specific IP addresses
  # 127.0.0.1 for local only, 0.0.0.0 for all interfaces
  # In production, bind to specific IPs for security
  bindIp: 127.0.0.1

  # Maximum number of simultaneous connections
  maxIncomingConnections: 1000

  # Enable IPv6 support
  ipv6: false

  # Wire compression for network traffic
  compression:
    compressors: snappy,zstd

# ----------------------------------------
# Storage Settings
# ----------------------------------------
storage:
  # Directory where MongoDB stores data
  # IMPORTANT: Ensure this directory exists and has proper permissions
  dbPath: /var/lib/mongodb

  # Storage engine: wiredTiger (default, recommended) or inMemory
  engine: wiredTiger

  # Create the dbPath if it doesn't exist
  # directoryPerDB: false

  # WiredTiger specific settings
  wiredTiger:
    engineConfig:
      # Cache size - 50% of RAM minus 1GB for OS
      # For 4GB RAM: 1.5GB, For 8GB RAM: 3.5GB, For 16GB RAM: 7.5GB
      cacheSizeGB: 1.5

      # Journal settings for write durability
      journalCompressor: snappy

      # Directory for journal files
      # directoryForIndexes: false

    collectionConfig:
      # Block compression for collections
      blockCompressor: snappy

    indexConfig:
      # Prefix compression for indexes
      prefixCompression: true

  # Journal settings
  journal:
    # Enable journaling for data durability (REQUIRED for production!)
    enabled: true

    # Commit interval in milliseconds (100ms default)
    commitIntervalMs: 100

# ----------------------------------------
# System Log
# ----------------------------------------
systemLog:
  # Log destination: file or syslog
  destination: file

  # Log file path
  # IMPORTANT: Ensure directory exists
  path: /var/log/mongodb/mongod.log

  # Append to existing log file instead of creating new
  logAppend: true

  # Log rotation
  logRotate: reopen

  # Verbosity level: 0 (default) to 5 (most verbose)
  # 0 = Informational, 1 = Debug, 2+ = More detailed
  verbosity: 0

  # Component-specific verbosity
  component:
    accessControl:
      verbosity: 0
    command:
      verbosity: 0
    query:
      verbosity: 0
    replication:
      verbosity: 0
    storage:
      verbosity: 0
      journal:
        verbosity: 0
    write:
      verbosity: 0

  # Timestamp format
  timeStampFormat: iso8601-utc

# ----------------------------------------
# Process Management
# ----------------------------------------
processManagement:
  # Fork and run as daemon (Unix only)
  fork: true

  # PID file location
  pidFilePath: /var/run/mongodb/mongod.pid

  # Time zone data
  timeZoneInfo: /usr/share/zoneinfo

# ----------------------------------------
# Security
# ----------------------------------------
security:
  # Enable authentication
  # CRITICAL: Always enable in production!
  authorization: enabled

  # JavaScript execution
  # Disable if not needed for security
  javascriptEnabled: true

  # Keyfile for replica set authentication
  # keyFile: /path/to/keyfile

  # SCRAM authentication iterations
  # scramIterationCount: 10000

# ----------------------------------------
# Replication
# ----------------------------------------
replication:
  # Replica set name
  # Uncomment to enable replication
  replSetName: kitchenxpert-rs

  # Oplog size in MB (auto-sized by default)
  # For production, set to 5-15% of disk space
  oplogSizeMB: 1024

  # Enable majority read concern
  enableMajorityReadConcern: true

# ----------------------------------------
# Sharding (if using sharded cluster)
# ----------------------------------------
# sharding:
#   # Role: configsvr, shardsvr
#   clusterRole: shardsvr

# ----------------------------------------
# Operation Profiling
# ----------------------------------------
operationProfiling:
  # Profiling mode: off, slowOp, or all
  # slowOp: only log slow operations
  mode: slowOp

  # Slow operation threshold in milliseconds
  slowOpThresholdMs: 100

  # Sample rate for slow operations (0.0 to 1.0)
  slowOpSampleRate: 1.0

# ----------------------------------------
# Set Parameters
# ----------------------------------------
setParameter:
  # Enable access control
  enableLocalhostAuthBypass: false

  # Diagnostic data collection
  diagnosticDataCollectionEnabled: true

  # Connection pool settings
  # connPoolMaxShardedConnsPerHost: 200
  # connPoolMaxConnsPerHost: 200

  # Query settings
  # internalQueryExecMaxBlockingSortBytes: 33554432  # 32MB

  # Cursor timeout (10 minutes)
  cursorTimeoutMillis: 600000

  # Transaction lifetime (1 minute)
  transactionLifetimeLimitSeconds: 60

# ----------------------------------------
# Cloud Options (for MongoDB Atlas)
# ----------------------------------------
# cloud:
#   monitoring:
#     free:
#       state: runtime
#       tags: production

# ----------------------------------------
# Notes for Production Deployment
# ----------------------------------------
# 1. Always enable authentication (security.authorization: enabled)
# 2. Use replica sets for high availability (minimum 3 nodes)
# 3. Set appropriate cache size (50% RAM minus 1GB)
# 4. Enable journaling for data durability
# 5. Use snappy compression for better performance
# 6. Monitor slow queries with operation profiling
# 7. Set up regular backups with mongodump or cloud backups
# 8. Use SSL/TLS for network encryption in production
# 9. Restrict network access with firewall rules
# 10. Regular monitoring with MongoDB Atlas or Ops Manager

# ----------------------------------------
# SSL/TLS Configuration (Production)
# ----------------------------------------
# net:
#   ssl:
#     mode: requireSSL
#     PEMKeyFile: /path/to/mongodb.pem
#     CAFile: /path/to/ca.pem
#     allowConnectionsWithoutCertificates: false
