# Grafana Configuration for KitchenXpert
#
# This is the main Grafana server configuration file.
# Documentation: https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/

# ============================================
# Server Settings
# ============================================
[server]
# Protocol (http, https, h2, socket)
protocol = http

# The HTTP port to bind to
http_port = 3001

# The public facing domain name used to access Grafana from a browser
domain = grafana.kitchenxpert.com

# Redirect to correct domain if host header does not match domain
enforce_domain = false

# The full public facing URL
root_url = %(protocol)s://%(domain)s:%(http_port)s/

# Serve Grafana from subpath specified in `root_url`
serve_from_sub_path = false

# Log web requests
router_logging = false

# Enable gzip compression
enable_gzip = true

# Path to SSL certificate file (if using HTTPS)
;cert_file =
;cert_key =

# ============================================
# Database Settings
# ============================================
[database]
# Database type: sqlite3, mysql, postgres
type = postgres

# Database host
host = localhost:5432

# Database name
name = grafana

# Database user
user = grafana

# Database password (use environment variable in production)
password = ${GRAFANA_DB_PASSWORD}

# Use SSL/TLS for database connection
ssl_mode = require

# Path to CA certificate (if using SSL)
;ca_cert_path =
;client_key_path =
;client_cert_path =
;server_cert_name =

# Max idle database connections
max_idle_conn = 2

# Max open database connections
max_open_conn = 0

# Connection max lifetime (in seconds)
conn_max_lifetime = 14400

# Log database queries
log_queries = false

# Cache mode (private, shared)
cache_mode = private

# ============================================
# Session Settings
# ============================================
[session]
# Session provider: memory, file, redis, mysql, postgres
provider = postgres

# Provider config (connection string)
provider_config = user=grafana password=${GRAFANA_DB_PASSWORD} host=localhost port=5432 dbname=grafana sslmode=require

# Session cookie name
cookie_name = grafana_sess

# Cookie secure flag (set to true if using HTTPS)
cookie_secure = false

# Session lifetime (in seconds)
session_life_time = 86400

# Session garbage collection interval (in seconds)
gc_interval_time = 86400

# Session ID hash function: sha1, sha256
;id_length = 16

# ============================================
# Security Settings
# ============================================
[security]
# Default admin user (can be changed on first login)
admin_user = admin

# Default admin password (MUST be changed in production)
admin_password = ${GRAFANA_ADMIN_PASSWORD}

# Secret key for signing (MUST be set in production)
secret_key = ${GRAFANA_SECRET_KEY}

# Disable gravatar profile images
disable_gravatar = false

# Data source proxy whitelist (space separated)
;data_source_proxy_whitelist =

# Disable brute force login protection
disable_brute_force_login_protection = false

# Cookie samesite attribute: lax, strict, none
cookie_samesite = lax

# Allow embedding Grafana in iframes
allow_embedding = false

# Content security policy
;content_security_policy = false
;content_security_policy_template = """script-src 'self' 'unsafe-eval' 'unsafe-inline' 'strict-dynamic' $NONCE;object-src 'none';font-src 'self';style-src 'self' 'unsafe-inline' blob:;img-src * data:;base-uri 'self';connect-src 'self' grafana.com ws://$ROOT_PATH wss://$ROOT_PATH;manifest-src 'self';media-src 'none';form-action 'self';"""

# Enable strict transport security (HSTS)
;strict_transport_security = false
;strict_transport_security_max_age_seconds = 86400
;strict_transport_security_preload = false
;strict_transport_security_subdomains = false

# X-Content-Type-Options header
;x_content_type_options = true

# X-XSS-Protection header
;x_xss_protection = true

# ============================================
# Authentication Settings
# ============================================
[auth]
# Login cookie name
login_cookie_name = grafana_session

# Login maximum lifetime (in days)
login_maximum_inactive_lifetime_days = 7

# Login maximum lifetime (in days)
login_maximum_lifetime_days = 30

# Automatically assign new users to an organization
;auto_assign_org = true

# Automatically assign new users to this role
;auto_assign_org_role = Viewer

# OAuth auto-login
oauth_auto_login = false

# Disable sign-up (create new users)
disable_login_form = false

# Disable user sign-up
disable_signout_menu = false

# Sign-out redirect URL
;signout_redirect_url =

# ============================================
# Anonymous Authentication
# ============================================
[auth.anonymous]
# Enable anonymous access
enabled = false

# Organization name for anonymous users
org_name = Main Org.

# Organization role for anonymous users
org_role = Viewer

# Hide Grafana version
hide_version = false

# ============================================
# OAuth (Google, GitHub, etc.)
# ============================================
[auth.google]
enabled = false
;client_id =
;client_secret =
;scopes = https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email
;auth_url = https://accounts.google.com/o/oauth2/auth
;token_url = https://accounts.google.com/o/oauth2/token
;allowed_domains =
;allow_sign_up = true

[auth.github]
enabled = false
;client_id =
;client_secret =
;scopes = user:email,read:org
;auth_url = https://github.com/login/oauth/authorize
;token_url = https://github.com/login/oauth/access_token
;allowed_organizations =
;allow_sign_up = true

# ============================================
# Logging Settings
# ============================================
[log]
# Log mode: console, file, syslog
mode = console file

# Log level: debug, info, warn, error, critical
level = info

# Log filters (space separated)
;filters =

# ============================================
# Logging to Console
# ============================================
[log.console]
# Log level
level = info

# Log format: text, json
format = console

# ============================================
# Logging to File
# ============================================
[log.file]
# Log level
level = info

# Log format: text, json
format = json

# Log file path
log_rotate = true

# Max log file size (in MB)
max_lines = 1000000

# Max log file backups
max_size_shift = 28

# Daily rotate
daily_rotate = true

# Max days to keep log files
max_days = 7

# ============================================
# Metrics Settings
# ============================================
[metrics]
# Enable internal metrics
enabled = true

# Send internal Grafana metrics to Graphite
;interval_seconds = 10

# Graphite address
;address =
;prefix = prod.grafana.%(instance_name)s.

# ============================================
# Metrics - Prometheus
# ============================================
[metrics.prometheus]
# Enable Prometheus metrics endpoint
enabled = true

# Metrics endpoint path
;path = /metrics

# ============================================
# Distributed Tracing
# ============================================
[tracing.jaeger]
# Enable Jaeger tracing
enabled = false

# Jaeger agent address
;address = localhost:6831

# Always include trace
;always_included_tag = tag1:value1

# Sampler type
;sampler_type = const

# Sampler parameter
;sampler_param = 1

# ============================================
# Alerting Settings
# ============================================
[alerting]
# Enable alerting engine
enabled = true

# Execute alerts whose state has not been updated
execute_alerts = true

# Default evaluation timeout
evaluation_timeout_seconds = 30

# Default notification timeout
notification_timeout_seconds = 30

# Max concurrent alert evaluations
max_attempts = 3

# Min interval between evaluations
min_interval_seconds = 1

# ============================================
# Unified Alerting
# ============================================
[unified_alerting]
# Enable unified alerting
enabled = true

# Disable legacy alerting
;disabled_orgs =

# Alert state history backend: annotations, loki, multiple
;state_history_backend = annotations

# ============================================
# SMTP / Email Settings
# ============================================
[smtp]
# Enable SMTP
enabled = ${SMTP_ENABLED}

# SMTP host
host = ${SMTP_HOST}:${SMTP_PORT}

# SMTP user
user = ${SMTP_USER}

# SMTP password
password = ${SMTP_PASSWORD}

# SMTP certificate verification
;cert_file =
;key_file =
;skip_verify = false

# From address
from_address = grafana@kitchenxpert.com

# From name
from_name = KitchenXpert Grafana

# EHLO identity
;ehlo_identity =

# StartTLS policy: OpportunisticStartTLS, MandatoryStartTLS, NoStartTLS
;startTLS_policy =

# ============================================
# Plugin Settings
# ============================================
[plugins]
# Enable plugin installation
enable_alpha = false

# Plugin directory
;plugin_admin_enabled = true
;plugin_admin_external_manage_enabled = false
;plugin_catalog_url = https://grafana.com/grafana/plugins/

# Allow loading unsigned plugins
allow_loading_unsigned_plugins = false

# ============================================
# Users Settings
# ============================================
[users]
# Allow users to sign up
allow_sign_up = false

# Allow users to change their organization
allow_org_create = false

# Automatically assign new users to default organization
auto_assign_org = true

# Default role for new users
auto_assign_org_role = Viewer

# Require email verification
verify_email_enabled = false

# Default theme: dark, light, system
default_theme = dark

# External user management
;external_manage_link_url =
;external_manage_link_name =
;external_manage_info =

# Viewers can edit dashboards
viewers_can_edit = false

# Editors role
;editors_can_admin = false

# User invite max lifetime (in seconds)
;user_invite_max_lifetime_duration = 24h

# Hide user info
;hidden_users =

# ============================================
# Data Sources
# ============================================
[datasources]
# Data source query timeout (in seconds)
;datasource_limit = 5000

# ============================================
# Dashboards Settings
# ============================================
[dashboards]
# Dashboard versions to keep
versions_to_keep = 20

# Default home dashboard path
;default_home_dashboard_path =

# Min refresh interval
min_refresh_interval = 5s

# ============================================
# Explore Settings
# ============================================
[explore]
# Enable Explore feature
enabled = true

# ============================================
# Feature Toggles
# ============================================
[feature_toggles]
# Enable features that are in development
;enable = feature1,feature2

# ============================================
# External Image Storage (for alerts)
# ============================================
[external_image_storage]
# Provider: s3, webdav, gcs, azure_blob, local
provider = local

[external_image_storage.s3]
;endpoint =
;path_style_access =
;bucket =
;region =
;path =
;access_key =
;secret_key =

# ============================================
# Rendering (for image rendering)
# ============================================
[rendering]
# Rendering service URL
;server_url =
;callback_url =
;concurrent_render_request_limit = 30

# ============================================
# Panels Settings
# ============================================
[panels]
# Disable sanitize HTML in panel descriptions
disable_sanitize_html = false

# Enable alpha panels
enable_alpha = false

# ============================================
# Live Settings
# ============================================
[live]
# Maximum number of active connections
max_connections = 100

# Allowed origins (comma separated)
;allowed_origins =
