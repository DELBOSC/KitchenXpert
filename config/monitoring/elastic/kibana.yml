# ============================================
# Environment Variables
# ============================================
#
# Set these environment variables:
# - KIBANA_SYSTEM_PASSWORD: Password for kibana_system user
# - KIBANA_ENCRYPTION_KEY: 32-character string for encrypted saved objects
# - KIBANA_REPORTING_KEY: 32-character string for reporting
# - KIBANA_SECURITY_KEY: 32-character string for security
#
# Example docker-compose environment:
# environment:
#   - "KIBANA_SYSTEM_PASSWORD=changeme"
#   - "KIBANA_ENCRYPTION_KEY=something_at_least_32_characters_long"
#   - "KIBANA_REPORTING_KEY=something_at_least_32_characters_long"
#   - "KIBANA_SECURITY_KEY=something_at_least_32_characters_long"

# ============================================
# Plugin Configuration
# ============================================

# Disable plugin telemetry
# telemetry.enabled: false

# Plugin timeout
# elasticsearch.requestTimeout: 30000

# ============================================
# Performance Tuning
# ============================================

# Optimize bundle
# optimize.enabled: true

# Server max concurrent requests
# server.maxConcurrentRequests: 10

