# Logstash Pipeline Configuration for KitchenXpert
#
# This configuration defines the complete log processing pipeline:
# Input -> Filter -> Output
#
# Documentation: https://www.elastic.co/guide/en/logstash/current/configuration.html

# ============================================
# INPUT PLUGINS
# ============================================

input {
  # ------------------------------
  # Beats input (Filebeat, Metricbeat, etc.)
  # ------------------------------
  beats {
    port => 5044
    host => "0.0.0.0"

    # SSL/TLS configuration
    ssl => false
    # ssl_certificate => "/etc/logstash/certs/logstash.crt"
    # ssl_key => "/etc/logstash/certs/logstash.key"
    # ssl_certificate_authorities => ["/etc/logstash/certs/ca.crt"]
    # ssl_verify_mode => "force_peer"

    # Client authentication
    # ssl_client_authentication => "required"

    # Additional tags
    tags => ["beats"]
  }

  # ------------------------------
  # Syslog input
  # ------------------------------
  syslog {
    port => 5514
    host => "0.0.0.0"
    type => "syslog"
    tags => ["syslog"]
  }

  # ------------------------------
  # HTTP input (for application logs)
  # ------------------------------
  http {
    port => 8080
    host => "0.0.0.0"
    type => "http"
    tags => ["http"]

    # Additional metadata
    additional_codecs => {
      "application/json" => "json"
    }

    # Response headers
    response_headers => {
      "Content-Type" => "application/json"
    }

    # Authentication
    # user => "logstash"
    # password => "${HTTP_PASSWORD}"
  }

  # ------------------------------
  # TCP input (for generic log shipping)
  # ------------------------------
  tcp {
    port => 5000
    host => "0.0.0.0"
    type => "tcp"
    tags => ["tcp"]
    codec => json_lines
  }

  # ------------------------------
  # File input (for local log files)
  # ------------------------------
  file {
    path => [
      "/var/log/kitchenxpert/*.log",
      "/var/log/nginx/access.log",
      "/var/log/nginx/error.log"
    ]
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb"
    type => "file"
    tags => ["file"]
    codec => "json"
  }

  # ------------------------------
  # Redis input (for buffering)
  # ------------------------------
  # redis {
  #   host => "localhost"
  #   port => 6379
  #   password => "${REDIS_PASSWORD}"
  #   data_type => "list"
  #   key => "logstash"
  #   tags => ["redis"]
  # }

  # ------------------------------
  # Kafka input (for high-volume log streaming)
  # ------------------------------
  # kafka {
  #   bootstrap_servers => "kafka:9092"
  #   topics => ["logs"]
  #   group_id => "logstash"
  #   consumer_threads => 4
  #   tags => ["kafka"]
  #   codec => "json"
  # }
}

# ============================================
# FILTER PLUGINS
# ============================================

filter {
  # ------------------------------
  # Parse JSON logs
  # ------------------------------
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      skip_on_invalid_json => true
      tag_on_failure => ["_jsonparsefailure"]
    }
  }

  # ------------------------------
  # Parse timestamp
  # ------------------------------
  if [timestamp] {
    date {
      match => [
        "timestamp",
        "ISO8601",
        "yyyy-MM-dd HH:mm:ss",
        "yyyy-MM-dd'T'HH:mm:ss.SSSZ",
        "yyyy-MM-dd'T'HH:mm:ss.SSS'Z'",
        "UNIX"
      ]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # ------------------------------
  # Grok patterns for common log formats
  # ------------------------------

  # Nginx access logs
  if [type] == "nginx-access" or [source] =~ /nginx.*access/ {
    grok {
      match => {
        "message" => '%{IPORHOST:remote_addr} - %{DATA:remote_user} \[%{HTTPDATE:time_local}\] "%{WORD:method} %{DATA:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status} %{NUMBER:body_bytes_sent} "%{DATA:http_referer}" "%{DATA:http_user_agent}"'
      }
      tag_on_failure => ["_grokparsefailure_nginx_access"]
    }

    # Convert fields to proper types
    mutate {
      convert => {
        "status" => "integer"
        "body_bytes_sent" => "integer"
        "http_version" => "float"
      }
      add_field => { "log_type" => "nginx_access" }
    }
  }

  # Nginx error logs
  if [type] == "nginx-error" or [source] =~ /nginx.*error/ {
    grok {
      match => {
        "message" => '%{DATESTAMP:timestamp} \[%{DATA:severity}\] %{GREEDYDATA:error_message}'
      }
      tag_on_failure => ["_grokparsefailure_nginx_error"]
    }

    mutate {
      add_field => { "log_type" => "nginx_error" }
    }
  }

  # Application logs (KitchenXpert API)
  if [service] == "kitchenxpert-api" or [type] == "application" {
    # Already in JSON format, just add metadata
    mutate {
      add_field => { "log_type" => "application" }
    }

    # Extract error information
    if [level] in ["error", "fatal"] {
      mutate {
        add_tag => ["error"]
      }

      # Extract stack trace
      if [stack] {
        mutate {
          rename => { "stack" => "error.stack_trace" }
        }
      }
    }

    # Extract request information
    if [requestId] {
      mutate {
        rename => { "requestId" => "request.id" }
      }
    }

    if [userId] {
      mutate {
        rename => { "userId" => "user.id" }
      }
    }
  }

  # PostgreSQL logs
  if [type] == "postgresql" {
    grok {
      match => {
        "message" => '%{TIMESTAMP_ISO8601:timestamp} \[%{NUMBER:pid}\] %{DATA:user}@%{DATA:database} %{WORD:level}:  %{GREEDYDATA:message}'
      }
      overwrite => ["message"]
      tag_on_failure => ["_grokparsefailure_postgresql"]
    }

    mutate {
      add_field => { "log_type" => "postgresql" }
    }
  }

  # ------------------------------
  # Add geolocation data (for IP addresses)
  # ------------------------------
  if [remote_addr] {
    geoip {
      source => "remote_addr"
      target => "geoip"

      # GeoIP database path
      # database => "/usr/share/logstash/geoip/GeoLite2-City.mmdb"

      # Fields to add
      fields => [
        "city_name",
        "country_name",
        "country_code2",
        "continent_code",
        "region_name",
        "location"
      ]
    }
  }

  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # ------------------------------
  # User agent parsing
  # ------------------------------
  if [http_user_agent] or [userAgent] {
    useragent {
      source => "http_user_agent"
      target => "user_agent"

      # Remove original field
      remove_field => ["http_user_agent"]
    }
  }

  # ------------------------------
  # Add environment and service metadata
  # ------------------------------
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "logs"
    }
  }

  if ![environment] {
    mutate {
      add_field => { "environment" => "${ENVIRONMENT:production}" }
    }
  }

  if ![host] {
    mutate {
      add_field => { "host" => "%{[host][name]}" }
    }
  }

  # ------------------------------
  # Normalize log levels
  # ------------------------------
  if [level] {
    mutate {
      lowercase => ["level"]
    }

    # Map log levels to numeric severity
    translate {
      field => "level"
      destination => "severity_code"
      dictionary => {
        "trace" => "0"
        "debug" => "1"
        "info" => "2"
        "warn" => "3"
        "error" => "4"
        "fatal" => "5"
      }
      fallback => "2"
    }

    mutate {
      convert => { "severity_code" => "integer" }
    }
  }

  # ------------------------------
  # Extract HTTP status code category
  # ------------------------------
  if [status] {
    ruby {
      code => "
        status = event.get('status').to_i
        event.set('status_category', status / 100)
      "
    }
  }

  # ------------------------------
  # Calculate request duration category
  # ------------------------------
  if [duration] {
    ruby {
      code => "
        duration = event.get('duration').to_f
        if duration < 100
          category = 'fast'
        elsif duration < 1000
          category = 'medium'
        elsif duration < 5000
          category = 'slow'
        else
          category = 'very_slow'
        end
        event.set('duration_category', category)
      "
    }
  }

  # ------------------------------
  # Remove unnecessary fields
  # ------------------------------
  mutate {
    remove_field => [
      "beat",
      "prospector",
      "input",
      "offset",
      "@version",
      "headers"
    ]
  }

  # ------------------------------
  # Drop health check logs (optional)
  # ------------------------------
  if [request] =~ /\/health/ or [url] =~ /\/health/ {
    drop { }
  }

  # ------------------------------
  # Drop debug logs in production (optional)
  # ------------------------------
  if [environment] == "production" and [level] == "debug" {
    drop { }
  }
}

# ============================================
# OUTPUT PLUGINS
# ============================================

output {
  # ------------------------------
  # Elasticsearch output
  # ------------------------------
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:localhost:9200}"]

    # Authentication
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD}"

    # SSL configuration
    ssl => false
    # cacert => "/etc/logstash/certs/ca.crt"
    # ssl_certificate_verification => true

    # Index configuration
    index => "%{[@metadata][index_prefix]}-%{[environment]}-%{+YYYY.MM.dd}"

    # Document ID (optional, for deduplication)
    # document_id => "%{[@metadata][fingerprint]}"

    # ILM (Index Lifecycle Management)
    ilm_enabled => true
    ilm_rollover_alias => "logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "logs-policy"

    # Retry configuration
    retry_on_conflict => 3

    # Pipeline configuration
    pipeline => "logs-pipeline"

    # Manage template
    manage_template => true
    template_name => "logs-template"
    template_overwrite => true

    # Performance tuning
    bulk_path => "/_bulk"
    # workers => 4
    # flush_size => 500
    # idle_flush_time => 5
  }

  # ------------------------------
  # S3 output (for long-term storage)
  # ------------------------------
  # s3 {
  #   region => "us-east-1"
  #   bucket => "kitchenxpert-logs"
  #   prefix => "logs/%{environment}/%{+YYYY}/%{+MM}/%{+dd}"
  #
  #   # Credentials
  #   access_key_id => "${AWS_ACCESS_KEY_ID}"
  #   secret_access_key => "${AWS_SECRET_ACCESS_KEY}"
  #
  #   # File rotation
  #   size_file => 10485760  # 10MB
  #   time_file => 15        # 15 minutes
  #
  #   # Compression
  #   codec => "json_lines"
