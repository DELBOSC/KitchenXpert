  #   path => "/var/log/logstash/output-%{+YYYY-MM-dd}.log"
  #   codec => json_lines
  # }

  # ------------------------------
  # Stdout output (for debugging)
  # ------------------------------
  # stdout {
  #   codec => rubydebug {
  #     metadata => true
  #   }
  # }

  # ------------------------------
  # Dead letter queue for failed events
