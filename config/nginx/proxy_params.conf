# ==============================================================================
# KitchenXpert - Proxy Parameters Configuration
# ==============================================================================
# Description: Common proxy headers and settings for backend proxying
#              Include this file in location blocks that proxy to upstream servers
# Usage: include /etc/nginx/conf.d/proxy_params.conf;
# ==============================================================================

# HTTP version for upstream connections
proxy_http_version 1.1;

# --------------------------------------------------------------------------
# Standard Proxy Headers
# --------------------------------------------------------------------------
# Host header - preserve original host
proxy_set_header Host $host;

# Real client IP address
proxy_set_header X-Real-IP $remote_addr;

# Forwarded IP addresses (append to existing)
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

# Original protocol (http or https)
proxy_set_header X-Forwarded-Proto $scheme;

# Request ID for tracing (generated by nginx)
proxy_set_header X-Request-ID $request_id;

# Clear Connection header for keep-alive
proxy_set_header Connection "";

# --------------------------------------------------------------------------
# Proxy Buffering Settings
# --------------------------------------------------------------------------
# Enable buffering for better performance
proxy_buffering on;

# Buffer size for reading response headers
proxy_buffer_size 4k;

# Number and size of buffers for reading response
proxy_buffers 8 4k;

# Maximum size of buffers that can be busy sending to client
proxy_busy_buffers_size 8k;

# --------------------------------------------------------------------------
# Timeouts
# --------------------------------------------------------------------------
# Time to establish connection to upstream
proxy_connect_timeout 60s;

# Time between successive read operations
proxy_read_timeout 60s;

# Time between successive write operations
proxy_send_timeout 60s;

# --------------------------------------------------------------------------
# Additional Headers (Optional)
# --------------------------------------------------------------------------
# Uncomment to enable additional features

# Forward original request URI
# proxy_set_header X-Original-URI $request_uri;

# Forward server name
# proxy_set_header X-Forwarded-Server $host;

# Forward original host
# proxy_set_header X-Forwarded-Host $host;

# Forward original port
# proxy_set_header X-Forwarded-Port $server_port;
