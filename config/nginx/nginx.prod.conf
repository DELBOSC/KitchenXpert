# ==============================================================================
# KitchenXpert - Production Environment Configuration
# ==============================================================================
# Description: Production-optimized nginx settings with strict security,
#              HTTPS/TLS, aggressive caching, and performance optimizations
# Environment: Production
# ==============================================================================

# This file should be included in the main nginx.conf for production
# Uncomment the include line in nginx.conf: include /etc/nginx/nginx.prod.conf;

# ==============================================================================
# Production-Specific Settings
# ==============================================================================

# Error log level - warnings and errors only
error_log /var/log/nginx/error.prod.log warn;

http {
    # --------------------------------------------------------------------------
    # Logging - Optimized for Production
    # --------------------------------------------------------------------------
    log_format production '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" rt=$request_time '
                          'urt="$upstream_response_time" '
                          'cs=$upstream_cache_status';

    access_log /var/log/nginx/access.prod.log production buffer=32k flush=5s;

    # --------------------------------------------------------------------------
    # SSL/TLS Configuration - Strict Production Settings
    # --------------------------------------------------------------------------
    # SSL protocols - TLS 1.2 and 1.3 only
    ssl_protocols TLSv1.2 TLSv1.3;

    # Modern cipher suites (Mozilla Modern compatibility)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    # Let clients choose cipher (recommended for TLS 1.3)
    ssl_prefer_server_ciphers off;

    # SSL session cache for performance
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # DH parameters for DHE ciphers (generate with: openssl dhparam -out /etc/nginx/dhparam.pem 4096)
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # OCSP stapling for certificate validation
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

    # DNS resolvers
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # --------------------------------------------------------------------------
    # HTTP/2 Configuration
    # --------------------------------------------------------------------------
    # Enable HTTP/2 for better performance
    http2 on;
    http2_max_field_size 16k;
    http2_max_header_size 32k;

    # --------------------------------------------------------------------------
    # Security Headers - Strict Production Settings
    # --------------------------------------------------------------------------
    # HSTS - Force HTTPS for 2 years, include subdomains
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy - Strict policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy - strict
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy - restrict features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;

    # Hide server information
    server_tokens off;
    more_clear_headers 'Server';
    more_clear_headers 'X-Powered-By';

    # --------------------------------------------------------------------------
    # Gzip Compression - Aggressive
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/xhtml+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        application/x-font-truetype
        application/wasm
        image/svg+xml
        image/x-icon
        font/opentype
        font/eot
        font/otf;
    gzip_min_length 1000;
    gzip_disable "msie6";

    # Brotli compression (if ngx_brotli module is installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;

    # --------------------------------------------------------------------------
    # Caching - Aggressive for Production
    # --------------------------------------------------------------------------
    # Proxy cache settings
    proxy_cache_valid 200 302 10m;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_revalidate on;

    # Static file caching
    open_file_cache max=10000 inactive=5m;
    open_file_cache_valid 2m;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    # --------------------------------------------------------------------------
    # Rate Limiting - Production Settings
    # --------------------------------------------------------------------------
    # Strict rate limiting
    limit_req_zone $binary_remote_addr zone=prod_api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=prod_auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=prod_login_limit:10m rate=3r/m;
    limit_conn_zone $binary_remote_addr zone=prod_conn_limit:10m;

    # Request body size limit
    client_max_body_size 10M;

    # --------------------------------------------------------------------------
    # Performance Optimizations
    # --------------------------------------------------------------------------
    # Timeouts - optimized for production
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;
    keepalive_timeout 30;
    keepalive_requests 100;

    # Reset timed out connections
    reset_timedout_connection on;

    # Proxy settings for upstream servers
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # --------------------------------------------------------------------------
    # Upstream Configuration - Production Load Balancing
    # --------------------------------------------------------------------------
    upstream api_backend {
        # Least connection load balancing
        least_conn;

        # Production backend servers (add your actual servers)
        server localhost:4000 max_fails=3 fail_timeout=30s weight=1;
        server localhost:4001 max_fails=3 fail_timeout=30s weight=1;
        # server localhost:4002 max_fails=3 fail_timeout=30s weight=1;

        # Health check (requires nginx plus or use backup server)
        # health_check interval=10s fails=3 passes=2;

        # Backup server
        # server localhost:4003 backup;

        # Keep-alive connections to upstream
        keepalive 64;
        keepalive_timeout 60s;
        keepalive_requests 100;
    }

    # --------------------------------------------------------------------------
    # GeoIP Configuration (if ngx_http_geoip_module is available)
    # --------------------------------------------------------------------------
    # geoip_country /usr/share/GeoIP/GeoIP.dat;
    # geoip_city /usr/share/GeoIP/GeoLiteCity.dat;

    # Block specific countries (example)
    # map $geoip_country_code $allowed_country {
    #     default yes;
    #     CN no;  # China
    #     RU no;  # Russia
    # }

    # --------------------------------------------------------------------------
    # Environment Headers
    # --------------------------------------------------------------------------
    add_header X-Environment "production" always;

    # --------------------------------------------------------------------------
    # Monitoring & Health Checks
    # --------------------------------------------------------------------------
    # Status page for monitoring (restrict access in production)
    server {
        listen 127.0.0.1:8080;
        server_name localhost;

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
