# ==============================================================================
# KitchenXpert - Main Nginx Configuration
# ==============================================================================
# Description: Main nginx configuration file with optimized settings for
#              high-performance web serving, security, and modern protocols
# Version: 1.24+
# ==============================================================================

# User context for worker processes (adjust based on your system)
user nginx;

# Auto-detect number of CPU cores for optimal performance
worker_processes auto;

# Error log location and level
error_log /var/log/nginx/error.log warn;

# PID file location
pid /var/run/nginx.pid;

# Worker process priority (-20 to 20, lower = higher priority)
worker_priority -10;

# Maximum number of open files per worker process
worker_rlimit_nofile 65535;

# ==============================================================================
# Events Block - Connection Processing
# ==============================================================================
events {
    # Maximum number of simultaneous connections per worker
    worker_connections 1024;

    # Use efficient connection processing method (epoll for Linux)
    use epoll;

    # Accept multiple connections at once
    multi_accept on;
}

# ==============================================================================
# HTTP Block - Main HTTP Configuration
# ==============================================================================
http {
    # --------------------------------------------------------------------------
    # MIME Types & Default Settings
    # --------------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --------------------------------------------------------------------------
    # Logging Configuration
    # --------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # --------------------------------------------------------------------------
    # Performance Optimizations
    # --------------------------------------------------------------------------
    # Enable sendfile for efficient file transfers
    sendfile on;

    # Optimize sendfile packets
    tcp_nopush on;
    tcp_nodelay on;

    # Keep-alive timeout for client connections
    keepalive_timeout 65;
    keepalive_requests 100;

    # Server tokens (hide nginx version)
    server_tokens off;

    # Reset lingering timed out connections
    reset_timedout_connection on;

    # Client timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # --------------------------------------------------------------------------
    # Buffer Settings
    # --------------------------------------------------------------------------
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 20M;
    large_client_header_buffers 4 16k;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        font/opentype
        application/vnd.ms-fontobject
        application/wasm;
    gzip_min_length 1000;
    gzip_disable "msie6";

    # --------------------------------------------------------------------------
    # Security Headers (Global Defaults)
    # --------------------------------------------------------------------------
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy (formerly Feature-Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # --------------------------------------------------------------------------
    # SSL/TLS Configuration (Global Defaults)
    # --------------------------------------------------------------------------
    # SSL protocols (TLS 1.2 and 1.3 only)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites (prioritize modern, secure ciphers)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # Prefer server ciphers
    ssl_prefer_server_ciphers off;

    # SSL session configuration
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # DNS resolvers for OCSP
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --------------------------------------------------------------------------
    # Rate Limiting Zones
    # --------------------------------------------------------------------------
    # General API rate limiting (10 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Authentication endpoint rate limiting (5 requests per minute per IP)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # General connection limiting (10 connections per IP)
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --------------------------------------------------------------------------
    # Upstream Definitions (Load Balancing Ready)
    # --------------------------------------------------------------------------
    # Backend API servers
    upstream api_backend {
        # Least connection load balancing
        least_conn;

        # Backend servers (add more for horizontal scaling)
        server localhost:4000 max_fails=3 fail_timeout=30s;
        # server localhost:4001 max_fails=3 fail_timeout=30s;
        # server localhost:4002 max_fails=3 fail_timeout=30s;

        # Keep-alive connections to upstream
        keepalive 32;
        keepalive_timeout 60s;
    }

    # --------------------------------------------------------------------------
    # Cache Configuration
    # --------------------------------------------------------------------------
    # Proxy cache path for API responses
    proxy_cache_path /var/cache/nginx/api
                     levels=1:2
                     keys_zone=api_cache:10m
                     max_size=100m
                     inactive=60m
                     use_temp_path=off;

    # Static files cache
    proxy_cache_path /var/cache/nginx/static
                     levels=1:2
                     keys_zone=static_cache:10m
                     max_size=1g
                     inactive=7d
                     use_temp_path=off;

    # --------------------------------------------------------------------------
    # Include Virtual Host Configurations
    # --------------------------------------------------------------------------
    # Include environment-specific configurations
    # Uncomment the appropriate file based on your environment
    # include /etc/nginx/nginx.dev.conf;
    # include /etc/nginx/nginx.prod.conf;

    # Include enabled site configurations
    include /etc/nginx/sites-enabled/*.conf;
}
