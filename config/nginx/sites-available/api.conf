# ==============================================================================
# KitchenXpert - Backend API Virtual Host Configuration
# ==============================================================================
# Description: Reverse proxy configuration for the KitchenXpert backend API
#              Includes WebSocket support, rate limiting, CORS, and health checks
# Service: Backend API
# Upstream: localhost:4000
# ==============================================================================

# HTTP server - Redirect to HTTPS (Production only)
server {
    listen 80;
    listen [::]:80;
    server_name api.kitchenxpert.com;

    # Access logs
    access_log /var/log/nginx/api.access.log main;
    error_log /var/log/nginx/api.error.log warn;

    # Health check endpoint (accessible via HTTP)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other traffic to HTTPS (uncomment for production)
    # location / {
    #     return 301 https://$server_name$request_uri;
    # }

    # For development, proxy to API directly
    location / {
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}

# HTTPS server - Main API configuration
server {
    # SSL configuration (uncomment for production)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;

    # For development (HTTP only)
    listen 443;
    listen [::]:443;

    server_name api.kitchenxpert.com;

    # SSL certificates (update paths for your certificates)
    # ssl_certificate /etc/nginx/ssl/api.kitchenxpert.com.crt;
    # ssl_certificate_key /etc/nginx/ssl/api.kitchenxpert.com.key;

    # Access logs with detailed timing
    access_log /var/log/nginx/api.access.log detailed;
    error_log /var/log/nginx/api.error.log warn;

    # Maximum request body size (for file uploads)
    client_max_body_size 20M;

    # --------------------------------------------------------------------------
    # Security Headers
    # --------------------------------------------------------------------------
    add_header X-Environment $http_x_environment always;
    add_header X-Request-ID $request_id always;

    # --------------------------------------------------------------------------
    # Rate Limiting
    # --------------------------------------------------------------------------
    # Apply general API rate limiting
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 10;

    # --------------------------------------------------------------------------
    # CORS Configuration
    # --------------------------------------------------------------------------
    # Allowed origins (update for your frontend domains)
    set $cors_origin "";

    if ($http_origin ~* (https?://(localhost|127\.0\.0\.1|kitchenxpert\.com|[a-zA-Z0-9\-]+\.kitchenxpert\.com)(:[0-9]+)?$)) {
        set $cors_origin $http_origin;
    }

    # --------------------------------------------------------------------------
    # Health Check Endpoint
    # --------------------------------------------------------------------------
    location /health {
        access_log off;
        proxy_pass http://api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Quick timeout for health checks
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    # --------------------------------------------------------------------------
    # Metrics/Status Endpoint (restricted access)
    # --------------------------------------------------------------------------
    location /metrics {
        # Restrict to internal IPs only
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://api_backend/metrics;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --------------------------------------------------------------------------
    # Authentication Endpoints - Strict Rate Limiting
    # --------------------------------------------------------------------------
    location ~ ^/api/(auth|login|register|password) {
        # Strict rate limiting for auth endpoints
        limit_req zone=auth_limit burst=5 nodelay;

        # CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;

        # No caching for auth endpoints
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # --------------------------------------------------------------------------
    # WebSocket Support - Real-time connections
    # --------------------------------------------------------------------------
    location /ws {
        proxy_pass http://api_backend;

        # WebSocket headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Longer timeouts for WebSocket
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # No buffering for WebSocket
        proxy_buffering off;
    }

    # --------------------------------------------------------------------------
    # File Upload Endpoint
    # --------------------------------------------------------------------------
    location ~ ^/api/upload {
        # Higher body size limit for uploads
        client_max_body_size 50M;

        # Longer timeouts for large uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;

        # Disable buffering for uploads
        proxy_request_buffering off;
    }

    # --------------------------------------------------------------------------
    # API Routes - General
    # --------------------------------------------------------------------------
    location /api {
        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # CORS headers
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, X-Request-ID' always;

        # Proxy to backend
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;

        # Cache configuration for GET requests
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 5m;
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # --------------------------------------------------------------------------
    # GraphQL Endpoint (if applicable)
    # --------------------------------------------------------------------------
    location /graphql {
        # CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;

        # No caching for GraphQL
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # --------------------------------------------------------------------------
    # Default Location
    # --------------------------------------------------------------------------
    location / {
        return 404 '{"error": "Not found"}';
        add_header Content-Type application/json always;
    }
}

# --------------------------------------------------------------------------
# Proxy Parameters Include File
# --------------------------------------------------------------------------
# Create this file at: /etc/nginx/conf.d/proxy_params.conf
# Contents:
#   proxy_http_version 1.1;
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_set_header X-Request-ID $request_id;
#   proxy_set_header Connection "";
#   proxy_buffering on;
#   proxy_buffer_size 4k;
#   proxy_buffers 8 4k;
#   proxy_busy_buffers_size 8k;
