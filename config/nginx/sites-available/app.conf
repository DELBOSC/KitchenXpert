# ==============================================================================
# KitchenXpert - Frontend Application Virtual Host Configuration
# ==============================================================================
# Description: Configuration for serving the KitchenXpert React/Vue frontend
#              Includes SPA routing, asset caching, and compression
# Service: Frontend Application
# Root: /var/www/frontend/dist
# ==============================================================================

# HTTP server - Redirect to HTTPS (Production)
server {
    listen 80;
    listen [::]:80;
    server_name kitchenxpert.com www.kitchenxpert.com;

    # Access logs
    access_log /var/log/nginx/app.access.log main;
    error_log /var/log/nginx/app.error.log warn;

    # Redirect to HTTPS (uncomment for production)
    # return 301 https://$server_name$request_uri;

    # For development, serve directly
    root /var/www/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS server - Main application configuration
server {
    # SSL configuration (uncomment for production)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;

    # For development (HTTP only)
    listen 443;
    listen [::]:443;

    server_name kitchenxpert.com www.kitchenxpert.com;

    # SSL certificates (update paths for your certificates)
    # ssl_certificate /etc/nginx/ssl/kitchenxpert.com.crt;
    # ssl_certificate_key /etc/nginx/ssl/kitchenxpert.com.key;

    # Document root
    root /var/www/frontend/dist;
    index index.html;

    # Access logs
    access_log /var/log/nginx/app.access.log main;
    error_log /var/log/nginx/app.error.log warn;

    # --------------------------------------------------------------------------
    # Security Headers
    # --------------------------------------------------------------------------
    # CSP for frontend application
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.kitchenxpert.com wss://api.kitchenxpert.com; frame-ancestors 'none';" always;

    # HSTS - enforce HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Additional security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --------------------------------------------------------------------------
    # Static Assets - Aggressive Caching
    # --------------------------------------------------------------------------
    # JavaScript and CSS with hash/version in filename
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Enable gzip_static if pre-compressed files exist
        gzip_static on;
    }

    # Images - Long-term caching
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fonts - Long-term caching
    location ~* \.(?:woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # Media files
    location ~* \.(?:mp4|webm|ogg|mp3|wav)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Manifest and service worker - short cache
    location ~* \.(?:manifest|webmanifest)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Service Worker - no cache
    location = /service-worker.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        access_log off;
    }

    # --------------------------------------------------------------------------
    # Special Files
    # --------------------------------------------------------------------------
    # robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # favicon.ico
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # sitemap.xml
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # --------------------------------------------------------------------------
    # Static Assets Directory
    # --------------------------------------------------------------------------
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Enable directory listing for debugging (disable in production)
        # autoindex on;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --------------------------------------------------------------------------
    # API Proxy (optional - if you want to proxy API through same domain)
    # --------------------------------------------------------------------------
    location /api {
        # Proxy to API server
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # No caching for API
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # --------------------------------------------------------------------------
    # Development Hot Reload (for Vite/Webpack Dev Server)
    # --------------------------------------------------------------------------
    # Uncomment for development with HMR
    # location /@vite/client {
    #     proxy_pass http://localhost:5173;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection $connection_upgrade;
    #     proxy_set_header Host $host;
    # }

    # location /__vite_hmr {
    #     proxy_pass http://localhost:5173;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection $connection_upgrade;
    # }

    # --------------------------------------------------------------------------
    # SPA Routing - Fallback to index.html
    # --------------------------------------------------------------------------
    location / {
        # Try to serve file directly, fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;

        # Short cache for HTML files
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # index.html - no cache
    location = /index.html {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # --------------------------------------------------------------------------
    # Error Pages
    # --------------------------------------------------------------------------
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }

    # --------------------------------------------------------------------------
    # Security - Deny access to hidden files
    # --------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to source files
    location ~* \.(?:map|ts|tsx|jsx)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# --------------------------------------------------------------------------
# Redirect www to non-www (or vice versa)
# --------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;

    server_name www.kitchenxpert.com;

    # SSL certificates
    # ssl_certificate /etc/nginx/ssl/kitchenxpert.com.crt;
    # ssl_certificate_key /etc/nginx/ssl/kitchenxpert.com.key;

    return 301 $scheme://kitchenxpert.com$request_uri;
}
