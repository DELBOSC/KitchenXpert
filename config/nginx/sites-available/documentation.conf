# ==============================================================================
# KitchenXpert - Documentation Site Virtual Host Configuration
# ==============================================================================
# Description: Configuration for the KitchenXpert documentation website
#              Includes optional basic auth and search-friendly caching
# Service: Documentation Site
# Root: /var/www/docs
# ==============================================================================

# HTTP server - Redirect to HTTPS (Production)
server {
    listen 80;
    listen [::]:80;
    server_name docs.kitchenxpert.com;

    # Access logs
    access_log /var/log/nginx/docs.access.log main;
    error_log /var/log/nginx/docs.error.log warn;

    # Redirect to HTTPS (uncomment for production)
    # return 301 https://$server_name$request_uri;

    # For development, serve directly
    root /var/www/docs;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}

# HTTPS server - Documentation configuration
server {
    # SSL configuration (uncomment for production)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;

    # For development (HTTP only)
    listen 443;
    listen [::]:443;

    server_name docs.kitchenxpert.com;

    # SSL certificates
    # ssl_certificate /etc/nginx/ssl/docs.kitchenxpert.com.crt;
    # ssl_certificate_key /etc/nginx/ssl/docs.kitchenxpert.com.key;

    # Document root
    root /var/www/docs;
    index index.html index.htm;

    # Access logs
    access_log /var/log/nginx/docs.access.log main;
    error_log /var/log/nginx/docs.error.log warn;

    # Character encoding
    charset utf-8;

    # --------------------------------------------------------------------------
    # Basic Authentication (Optional)
    # --------------------------------------------------------------------------
    # Uncomment to enable basic authentication
    # auth_basic "Documentation Access";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # To create password file:
    # htpasswd -c /etc/nginx/.htpasswd username

    # Allow public access to certain paths (if using auth)
    # location /public {
    #     auth_basic off;
    # }

    # --------------------------------------------------------------------------
    # Security Headers
    # --------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CSP for documentation
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; frame-ancestors 'self';" always;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/markdown
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --------------------------------------------------------------------------
    # Caching - Search Engine Friendly
    # --------------------------------------------------------------------------
    # HTML files - moderate caching for updates
    location ~* \.html?$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";

        # Try with and without .html extension
        try_files $uri $uri/ $uri.html =404;
    }

    # CSS and JavaScript
    location ~* \.(?:css|js)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # Images
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fonts
    location ~* \.(?:woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # PDF documentation
    location ~* \.pdf$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        add_header Content-Disposition "inline";
    }

    # --------------------------------------------------------------------------
    # Search Functionality
    # --------------------------------------------------------------------------
    # If using client-side search (like Lunr.js or Algolia)
    location /search.json {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # If using server-side search API
    location /api/search {
        # Proxy to search service
        proxy_pass http://localhost:7700;  # Example: Meilisearch
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No authentication required for search (unless you want it)
        # auth_basic off;
    }

    # --------------------------------------------------------------------------
    # Special Documentation Files
    # --------------------------------------------------------------------------
    # robots.txt - allow search engine indexing
    location = /robots.txt {
        log_not_found off;
        access_log off;

        # Allow all robots (adjust as needed)
        # Default content:
        # User-agent: *
        # Allow: /
        # Sitemap: https://docs.kitchenxpert.com/sitemap.xml
    }

    # sitemap.xml - for search engines
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --------------------------------------------------------------------------
    # API Documentation (Swagger/OpenAPI)
    # --------------------------------------------------------------------------
    location /api-docs {
        alias /var/www/docs/api;
        index index.html;

        # Specific caching for API docs
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Swagger UI static files
    location /swagger-ui/ {
        alias /var/www/docs/swagger-ui/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # OpenAPI spec file
    location /openapi.json {
        alias /var/www/docs/openapi.json;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # --------------------------------------------------------------------------
    # Static Assets
    # --------------------------------------------------------------------------
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Code examples downloads
    location /downloads/ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";

        # Optional: Force download instead of display
        # add_header Content-Disposition "attachment";
    }

    # --------------------------------------------------------------------------
    # Versioned Documentation
    # --------------------------------------------------------------------------
    # Support for multiple documentation versions
    location ~ ^/v([0-9]+)/ {
        # Extract version from URL
        set $version $1;

        # Serve from version-specific directory
        alias /var/www/docs/versions/v$version/;
        index index.html;

        expires 1h;
        add_header Cache-Control "public, must-revalidate";

        try_files $uri $uri/ $uri.html =404;
    }

    # Latest version redirect
    location = /latest {
        return 301 /v2/;  # Update to your latest version
    }

    # --------------------------------------------------------------------------
    # Markdown Files (if serving raw markdown)
    # --------------------------------------------------------------------------
    location ~* \.md$ {
        # Option 1: Serve as plain text
        default_type text/plain;

        # Option 2: Convert to HTML (requires markdown processor)
        # proxy_pass http://localhost:8000;  # Markdown rendering service

        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # --------------------------------------------------------------------------
    # Clean URLs - Remove .html extension
    # --------------------------------------------------------------------------
    location / {
        # Try exact match, directory, file with .html, then 404
        try_files $uri $uri/ $uri.html =404;

        # Moderate caching
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Redirect .html URLs to clean URLs
    if ($request_uri ~ ^/(.*)\.html(\?|$)) {
        return 301 /$1;
    }

    # --------------------------------------------------------------------------
    # Custom Error Pages
    # --------------------------------------------------------------------------
    error_page 404 /404.html;
    location = /404.html {
        internal;
        expires 1h;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }

    # --------------------------------------------------------------------------
    # Security - Deny access to hidden files
    # --------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~* \.(?:bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --------------------------------------------------------------------------
    # CORS for API Documentation Assets (if needed)
    # --------------------------------------------------------------------------
    location ~* ^/api-docs/.*\.(json|yaml|yml)$ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}

# --------------------------------------------------------------------------
# Analytics & Monitoring
# --------------------------------------------------------------------------
# To track documentation usage:
# - Enable access logs
# - Use log analysis tools (GoAccess, AWStats)
# - Integrate with analytics platforms (Google Analytics, Plausible)
