# ==============================================================================
# KitchenXpert - Partner Portal Virtual Host Configuration
# ==============================================================================
# Description: Configuration for the KitchenXpert partner portal with
#              enhanced security, optional client certificate authentication
# Service: Partner Portal
# Root: /var/www/partner-portal/dist
# ==============================================================================

# HTTP server - Redirect to HTTPS (Production only)
server {
    listen 80;
    listen [::]:80;
    server_name partners.kitchenxpert.com;

    # Access logs
    access_log /var/log/nginx/partner-portal.access.log main;
    error_log /var/log/nginx/partner-portal.error.log warn;

    # Always redirect to HTTPS for partner portal
    return 301 https://$server_name$request_uri;
}

# HTTPS server - Partner portal configuration
server {
    # SSL configuration
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name partners.kitchenxpert.com;

    # SSL certificates
    ssl_certificate /etc/nginx/ssl/partners.kitchenxpert.com.crt;
    ssl_certificate_key /etc/nginx/ssl/partners.kitchenxpert.com.key;

    # Enhanced SSL settings for partner portal
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    # --------------------------------------------------------------------------
    # Client Certificate Authentication (Optional)
    # --------------------------------------------------------------------------
    # Uncomment to enable mutual TLS authentication
    # ssl_client_certificate /etc/nginx/ssl/partner-ca.crt;
    # ssl_verify_client on;
    # ssl_verify_depth 2;

    # Optional client certificate (allows access without cert)
    # ssl_verify_client optional;

    # Document root
    root /var/www/partner-portal/dist;
    index index.html;

    # Access logs with client certificate info
    log_format partner '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" ssl_client=$ssl_client_s_dn';

    access_log /var/log/nginx/partner-portal.access.log partner;
    error_log /var/log/nginx/partner-portal.error.log warn;

    # --------------------------------------------------------------------------
    # Enhanced Security Headers
    # --------------------------------------------------------------------------
    # Strict HSTS with preload
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Strict CSP
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.kitchenxpert.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Additional security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # --------------------------------------------------------------------------
    # Rate Limiting - Stricter for partners
    # --------------------------------------------------------------------------
    limit_req zone=api_limit burst=10 nodelay;
    limit_conn conn_limit 5;

    # --------------------------------------------------------------------------
    # IP Whitelisting (Optional)
    # --------------------------------------------------------------------------
    # Uncomment to restrict access to specific IPs
    # allow 203.0.113.0/24;  # Partner office IP range
    # allow 198.51.100.50;    # Specific partner IP
    # deny all;

    # --------------------------------------------------------------------------
    # Client Certificate Verification Block (if using mutual TLS)
    # --------------------------------------------------------------------------
    # Deny access if client certificate is not valid
    # if ($ssl_client_verify != SUCCESS) {
    #     return 403 "Client certificate required and must be valid";
    # }

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --------------------------------------------------------------------------
    # Static Assets - Caching
    # --------------------------------------------------------------------------
    # JavaScript and CSS with versioning
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # Images
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fonts
    location ~* \.(?:woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # --------------------------------------------------------------------------
    # Authentication Endpoint with Extra Protection
    # --------------------------------------------------------------------------
    location /api/partner/auth {
        # Very strict rate limiting for login
        limit_req zone=auth_limit burst=3 nodelay;

        # Proxy to API
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Pass client certificate info to backend (if using mutual TLS)
        # proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
        # proxy_set_header X-Client-Cert-Verify $ssl_client_verify;

        # No caching
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # --------------------------------------------------------------------------
    # Partner API Endpoints
    # --------------------------------------------------------------------------
    location /api/partner {
        # Rate limiting
        limit_req zone=api_limit burst=10 nodelay;

        # Proxy to API
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        # Pass client certificate info (if using mutual TLS)
        # proxy_set_header X-Client-Cert-DN $ssl_client_s_dn;
        # proxy_set_header X-Client-Cert-Verify $ssl_client_verify;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Limited caching
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 2m;
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # --------------------------------------------------------------------------
    # File Downloads (Reports, Invoices, etc.)
    # --------------------------------------------------------------------------
    location /downloads/ {
        # Restrict access - require authentication
        # This would typically be handled by your application
        # but you can add basic auth as an extra layer

        alias /var/www/partner-portal/downloads/;

        # Optional basic auth
        # auth_basic "Partner Downloads";
        # auth_basic_user_file /etc/nginx/.htpasswd;

        # Prevent directory listing
        autoindex off;

        # Cache control
        expires 1h;
        add_header Cache-Control "private, must-revalidate";
    }

    # --------------------------------------------------------------------------
    # Static Assets Directory
    # --------------------------------------------------------------------------
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --------------------------------------------------------------------------
    # SPA Routing - Fallback to index.html
    # --------------------------------------------------------------------------
    location / {
        # Try to serve file directly, fallback to index.html
        try_files $uri $uri/ /index.html;

        # Short cache for HTML
        expires 5m;
        add_header Cache-Control "private, must-revalidate";
    }

    # index.html - no cache
    location = /index.html {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # --------------------------------------------------------------------------
    # Error Pages
    # --------------------------------------------------------------------------
    error_page 403 /403.html;
    location = /403.html {
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }

    # --------------------------------------------------------------------------
    # Security - Deny access to sensitive files
    # --------------------------------------------------------------------------
    # Hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Source files
    location ~* \.(?:map|ts|tsx|jsx)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Backup files
    location ~* \.(?:bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# --------------------------------------------------------------------------
