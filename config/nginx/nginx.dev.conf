# ==============================================================================
# KitchenXpert - Development Environment Configuration
# ==============================================================================
# Description: Development-specific nginx settings with verbose logging,
#              relaxed security, and no SSL requirements
# Environment: Development
# ==============================================================================

# This file should be included in the main nginx.conf for development
# Uncomment the include line in nginx.conf: include /etc/nginx/nginx.dev.conf;

# ==============================================================================
# Development-Specific Settings
# ==============================================================================

# Override error log level for verbose debugging
error_log /var/log/nginx/error.dev.log debug;

http {
    # --------------------------------------------------------------------------
    # Logging - Verbose for Development
    # --------------------------------------------------------------------------
    # Detailed logging format with timing information
    log_format dev '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time" '
                   'cs=$upstream_cache_status';

    access_log /var/log/nginx/access.dev.log dev;

    # --------------------------------------------------------------------------
    # Cache Settings - Minimal Caching
    # --------------------------------------------------------------------------
    # Disable proxy caching for development to always get fresh content
    proxy_cache off;
    proxy_no_cache 1;
    proxy_cache_bypass 1;

    # Browser cache settings - short TTL for development
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";

    # --------------------------------------------------------------------------
    # CORS - Permissive for Development
    # --------------------------------------------------------------------------
    # Allow all origins in development
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Max-Age' '1728000' always;

    # --------------------------------------------------------------------------
    # Error Pages - Detailed for Development
    # --------------------------------------------------------------------------
    # Show detailed error pages (not for production!)
    fastcgi_intercept_errors off;
    proxy_intercept_errors off;

    # --------------------------------------------------------------------------
    # Performance - Relaxed for Development
    # --------------------------------------------------------------------------
    # Disable gzip in development to speed up response times
    gzip off;

    # Longer timeouts for debugging
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    # --------------------------------------------------------------------------
    # Rate Limiting - Disabled for Development
    # --------------------------------------------------------------------------
    # Override rate limiting (comment out to enable)
    # limit_req_zone $binary_remote_addr zone=dev_limit:10m rate=1000r/s;

    # --------------------------------------------------------------------------
    # SSL/TLS - Disabled for Development (HTTP Only)
    # --------------------------------------------------------------------------
    # No SSL required in development - connections are HTTP only
    # If you need to test SSL locally, use self-signed certificates:
    # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout /etc/nginx/ssl/dev.key -out /etc/nginx/ssl/dev.crt

    # --------------------------------------------------------------------------
    # Upstream Overrides - Single Backend
    # --------------------------------------------------------------------------
    upstream api_backend {
        # Single backend server for development
        server localhost:4000;

        # Keep-alive connections
        keepalive 16;
    }

    # --------------------------------------------------------------------------
    # Development Headers
    # --------------------------------------------------------------------------
    # Add development environment indicator
    add_header X-Environment "development" always;

    # Relaxed security headers for development
    add_header X-Frame-Options "ALLOWALL" always;

    # Show nginx version for debugging
    server_tokens on;

    # --------------------------------------------------------------------------
    # Hot Reload Support
    # --------------------------------------------------------------------------
    # Support for development servers with hot reload (Vite, Webpack Dev Server)
    # These settings are included in the virtual host configs

    # WebSocket proxy settings for HMR (Hot Module Replacement)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
}
