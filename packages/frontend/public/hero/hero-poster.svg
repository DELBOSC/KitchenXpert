<?xml version="1.0" encoding="UTF-8"?>
<!--
  Fallback poster (1280×800) — used by HeroVideo.tsx until the real
  hero-poster.jpg is captured. Keep this file even after the JPG is
  produced — some preview tools (Slack, Discord) prefer SVG and we
  fall back to it gracefully.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a0a2a"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="100%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#aurora1)"/>
  <rect width="1280" height="800" fill="url(#aurora2)"/>
  <rect width="1280" height="800" fill="url(#grid)"/>

  <!-- Mock browser chrome -->
  <g transform="translate(140, 120)">
    <rect width="1000" height="600" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect width="1000" height="44" rx="16" fill="rgba(255,255,255,0.06)"/>
    <rect width="1000" height="22" y="22" fill="rgba(255,255,255,0.06)"/>
    <circle cx="20" cy="22" r="6" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="22" r="6" fill="#facc15" opacity="0.7"/>
    <circle cx="60" cy="22" r="6" fill="#10b981" opacity="0.7"/>
    <text x="500" y="27" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" font-family="ui-sans-serif">kitchenxpert.com / designer</text>

    <!-- Designer mock -->
    <rect x="0" y="44" width="220" height="556" fill="rgba(0,0,0,0.3)"/>
    <text x="20" y="72" fill="rgba(255,255,255,0.5)" font-size="10" font-family="ui-sans-serif">PALETTE — IKEA METOD</text>
    <g transform="translate(20, 90)">
      <rect width="180" height="40" rx="6" fill="rgba(255,255,255,0.04)"/>
      <rect y="50" width="180" height="40" rx="6" fill="rgba(255,255,255,0.04)"/>
      <rect y="100" width="180" height="40" rx="6" fill="rgba(255,255,255,0.04)"/>
      <rect y="150" width="180" height="40" rx="6" fill="rgba(167,139,250,0.18)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
      <rect y="200" width="180" height="40" rx="6" fill="rgba(255,255,255,0.04)"/>
    </g>

    <!-- Canvas -->
    <g transform="translate(220, 44)">
      <defs>
        <pattern id="floor" width="30" height="30" patternUnits="userSpaceOnUse">
          <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
        </pattern>
      </defs>
      <rect width="780" height="556" fill="rgba(10,10,15,0.5)"/>
      <rect width="780" height="556" fill="url(#floor)"/>

      <!-- Cabinets -->
      <g transform="translate(150, 200)" opacity="0.85">
        <rect width="120" height="80" fill="#e2e8f0" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
        <rect x="120" width="160" height="80" fill="#cbd5e1" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
        <rect x="280" width="120" height="80" fill="#e2e8f0" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
        <rect x="0" y="80" width="80" height="160" fill="#94a3b8" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
      </g>

      <!-- Snap line -->
      <line x1="270" y1="150" x2="270" y2="450" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4 4" opacity="0.7"/>

      <!-- Watermark -->
      <text x="400" y="540" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11" font-family="ui-sans-serif" letter-spacing="2">DESIGNER 3D — APERÇU</text>
    </g>
  </g>

  <!-- KitchenXpert mark -->
  <g transform="translate(60, 60)">
    <rect width="32" height="32" rx="8" fill="url(#aurora1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="44" y="22" fill="#fff" font-size="16" font-weight="600" font-family="ui-sans-serif">KitchenXpert</text>
  </g>
</svg>
