name: 🔧 Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/common/**'
      - 'packages/api-client/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/common/**'
      - 'packages/api-client/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.0'
  POSTGRES_VERSION: '16'
  REDIS_VERSION: '7'

jobs:
  # Job 1: Setup
  setup:
    name: 📦 Setup & Cache
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

  # Job 2: Lint
  lint:
    name: 🔍 Lint & Type Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Restore dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run ESLint
        run: pnpm lint:backend

      - name: 🎨 Check Prettier formatting
        run: pnpm format:check

      - name: 📝 TypeScript type check
        run: pnpm type-check:backend

  # Job 3: Unit Tests
  test-unit:
    name: 🧪 Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      DATABASE_URL: postgresql://test:test@localhost:5432/kitchenxpert_test
      DIRECT_URL: postgresql://test:test@localhost:5432/kitchenxpert_test
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: kitchenxpert_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_ACCESS_SECRET: test_secret_min_32_characters_long
      JWT_REFRESH_SECRET: test_secret_min_32_characters_long
      DATA_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kitchenxpert_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Restore dependencies
        run: pnpm install --frozen-lockfile

      - name: 🗄️ Provision test database (prisma db push)
        working-directory: packages/backend
        run: pnpm prisma:push

      - name: 🧪 Run unit tests
        run: pnpm test:backend --coverage

      - name: 📊 Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: backend
          name: backend-coverage
          token: ${{ env.CODECOV_TOKEN }}

  # Job 4: Integration Tests
  test-integration:
    name: 🔗 Integration Tests
    needs: setup
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/kitchenxpert_test
      DIRECT_URL: postgresql://test:test@localhost:5432/kitchenxpert_test
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: kitchenxpert_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_ACCESS_SECRET: test_secret_min_32_characters_long
      JWT_REFRESH_SECRET: test_secret_min_32_characters_long
      DATA_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kitchenxpert_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Restore dependencies
        run: pnpm install --frozen-lockfile

      - name: 🗄️ Provision test database (prisma db push)
        working-directory: packages/backend
        run: pnpm prisma:push

      - name: 🌱 Seed test data
        working-directory: packages/backend
        run: pnpm db:seed

      - name: 🔗 Run integration tests
        # False-green guard: `pnpm test:integration` exits 0 when the script is
        # absent (it is — root delegates `--filter backend`, which has no such
        # script), so this job was reporting green without running a single test.
        # Fail loudly until real integration tests exist. (Integration coverage
        # currently lives in the e2e.yml critical-flow suite vs a real backend+DB.)
        run: |
          grep -q '"test:integration"' packages/backend/package.json \
            || { echo "::error::No backend test:integration script — refusing to report a false-green no-op (implement integration tests or remove this job)"; exit 1; }
          pnpm test:integration
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kitchenxpert_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: test_secret_min_32_characters_long
          JWT_REFRESH_SECRET: test_secret_min_32_characters_long

  # Job 5: Build
  build:
    name: 🏗️ Build
    needs: [lint, test-unit]
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Restore dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build backend
        # Build via turbo so workspace deps (@kitchenxpert/common) are compiled
        # first — `pnpm build:backend` alone can tsc against a missing common/dist.
        # Same pattern as frontend-ci (#75) / e2e (#72).
        run: pnpm turbo run build --filter @kitchenxpert/backend
        env:
          NODE_ENV: production

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: packages/backend/dist
          retention-days: 7

  # Job 6: API Tests (Postman/Newman)
  test-api:
    name: 📡 API Tests
    needs: build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/kitchenxpert_test
      DIRECT_URL: postgresql://test:test@localhost:5432/kitchenxpert_test
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: kitchenxpert_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_ACCESS_SECRET: test_secret_min_32_characters_long
      JWT_REFRESH_SECRET: test_secret_min_32_characters_long
      DATA_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kitchenxpert_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Restore dependencies
        run: pnpm install --frozen-lockfile

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: packages/backend/dist

      - name: 🗄️ Provision test database (prisma db push)
        working-directory: packages/backend
        run: pnpm prisma:push

      - name: 🚀 Start API server
        working-directory: packages/backend
        run: |
          pnpm start &
          sleep 15
        env:
          PORT: 4000

      - name: 📡 Run API tests with Newman
        # False-green guard: same as integration above — `pnpm test:api` is a
        # no-op (script absent) that exited 0. Fail loudly until a real Newman
        # collection + script exist.
        run: |
          grep -q '"test:api"' packages/backend/package.json \
            || { echo "::error::No backend test:api script — refusing to report a false-green no-op (add the Newman collection + script or remove this job)"; exit 1; }
          pnpm test:api

      - name: 📊 Generate API test report
        if: always()
        run: |
          echo "## 📡 API Test Results" >> $GITHUB_STEP_SUMMARY
          cat newman-report.txt >> $GITHUB_STEP_SUMMARY || echo "No report generated" >> $GITHUB_STEP_SUMMARY

  # Job 7: Security Audit
  security:
    name: 🔒 Security Audit
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Run npm audit
        run: pnpm audit --audit-level=high

      - name: 🔍 OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        with:
          project: 'KitchenXpert-Backend'
          path: 'packages/backend'
          format: 'HTML'

  # Job 8: Success
  success:
    name: ✅ All Checks Passed
    needs: [lint, test-unit, test-integration, build, test-api, security]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: 🎉 Success
        run: |
          echo "## ✅ Backend CI - All checks passed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linting & type checking" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests with coverage" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Integration tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Production build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ API tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Ready to deploy!" >> $GITHUB_STEP_SUMMARY
