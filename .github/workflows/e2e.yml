name: E2E – critical flows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a new commit lands on the same branch
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  critical-flows:
    name: Playwright (critical)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kx_e2e
          POSTGRES_PASSWORD: kx_e2e_pw
          POSTGRES_DB: kitchenxpert_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U kx_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kx_e2e:kx_e2e_pw@localhost:5432/kitchenxpert_e2e
      DIRECT_URL: postgresql://kx_e2e:kx_e2e_pw@localhost:5432/kitchenxpert_e2e
      # pg native client reads discrete DB_* vars (cf packages/backend/src/config/app-config.ts:14-21).
      # Values mirror DATABASE_URL above -- kept literal because GitHub Actions
      # does not support YAML anchors in env: blocks (actions/runner#1182).
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: kx_e2e
      DB_PASSWORD: kx_e2e_pw
      DB_NAME: kitchenxpert_e2e
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_ACCESS_SECRET: e2e_access_secret_must_be_long_enough_for_validation_xxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: e2e_refresh_secret_must_be_long_enough_for_validation_xxxxxxxxxxx
      DATA_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      INTERNAL_API_KEY: e2e_internal_key
      CORS_ORIGINS: http://localhost:3005
      # Stripe is opt-in via secrets; Flow 7 self-skips when missing
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
      STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_TEST_PUBLIC_KEY }}
      E2E_BASE_URL: http://localhost:3005
      E2E_API_URL: http://localhost:4000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 8.15.0 }

      - name: Setup Node + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Provision + seed test DB
        working-directory: packages/backend
        run: |
          pnpm prisma:push
          pnpm db:seed

      - name: Build frontend (production bundle)
        # Use turbo so workspace dependencies (3d-engine, common, api-client,
        # design-system, ui-components) are built in topological order first.
        # turbo.json declares `@kitchenxpert/frontend#build` dependsOn ["^build"].
        run: pnpm turbo run build --filter @kitchenxpert/frontend

      - name: Build backend (compile dist/ for `node dist/index.js`)
        # "Start backend" below runs `pnpm start` = `node dist/index.js`, which
        # needs packages/backend/dist/. The frontend build above does NOT build
        # the backend (it isn't a frontend dependency), so build it explicitly.
        # turbo `@kitchenxpert/backend#build` dependsOn ["^build", "prisma:generate"]
        # → builds @kitchenxpert/common + generates the Prisma client + tsc.
        run: pnpm turbo run build --filter @kitchenxpert/backend

      - name: Start backend (background)
        working-directory: packages/backend
        run: |
          pnpm start &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
        env:
          PORT: 4000

      - name: Start frontend (background)
        working-directory: packages/frontend
        run: |
          pnpm preview --port 3005 --strictPort &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for services
        run: |
          npx wait-on http://localhost:4000/health http://localhost:3005 \
            --timeout 90000 --interval 1000

      # Optional: Stripe webhook forwarder. Only runs if the secret is set.
      - name: Start stripe-cli forwarder
        if: env.STRIPE_SECRET_KEY != ''
        run: |
          curl -fsSL https://github.com/stripe/stripe-cli/releases/download/v1.21.0/stripe_1.21.0_linux_x86_64.tar.gz \
            | tar xz
          ./stripe listen --forward-to localhost:4000/api/v1/payments/webhook \
            --api-key "$STRIPE_SECRET_KEY" &

      - name: Run critical flows
        env:
          PLAYWRIGHT_SUITE: critical
          CI: 'true'
        run: pnpm --filter frontend exec playwright test --project=chromium-desktop

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ github.run_id }}
          path: packages/frontend/test-results/
          retention-days: 7

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: packages/frontend/playwright-report/
          retention-days: 7

  visual-regression:
    name: Visual regression (5 pages)
    runs-on: ubuntu-latest
    # TEMP(baselines): `needs` removed so this runs independently of the (currently
    # red) critical-flows job, to generate the missing chromium-desktop baselines.
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 8.15.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Build + start frontend
        # Use turbo so workspace deps build in topological order (same as critical-flows above).
        run: |
          pnpm turbo run build --filter @kitchenxpert/frontend
          (cd packages/frontend && pnpm preview --port 3005 --strictPort &)
          npx wait-on http://localhost:3005 --timeout 60000

      - name: Run visual regression
        env:
          E2E_BASE_URL: http://localhost:3005
        run: |
          pnpm --filter frontend exec playwright test \
            e2e-critical/visual-regression.spec.ts \
            --project=chromium-desktop \
            --update-snapshots \
            --reporter=line

      # TEMP(baselines): publish the freshly generated linux baselines so they can
      # be downloaded and committed. Removed once baselines are in the repo.
      - name: Upload generated baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-${{ github.run_id }}
          path: packages/frontend/e2e-critical/visual-regression.spec.ts-snapshots/
          retention-days: 7

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ github.run_id }}
          path: packages/frontend/test-results/
          retention-days: 7
