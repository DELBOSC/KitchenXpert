name: 🤖 AI Modules CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/ai-modules/**'
      - '.github/workflows/ai-modules-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/ai-modules/**'

# NOTE: packages/ai-modules is a PYTHON package (requirements.txt + venv setup
# scripts + tests/test_*.py with pytest). The previous version of this workflow
# ran `pnpm --filter ai-modules lint|type-check|test|build`, none of which exist
# in its package.json (only `setup:*`) — so every step exited 0 without running
# anything (a false-green no-op, same class as #115). This is the real Python CI:
# ruff (lint), mypy (type-check), pytest (the 8 existing test files). ruff/mypy/
# pytest are already declared in requirements.txt. There is no Python "build"
# step (and no dist/), so the old build job is removed.
jobs:
  lint-and-test:
    name: 🔍 Lint & Test AI Modules (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai-modules
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ai-modules/requirements.txt

      - name: 📥 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Lint (ruff)
        run: ruff check .

      - name: 📝 Type check (mypy)
        run: mypy src

      - name: 🧪 Run tests (pytest)
        run: pytest tests/ -v
