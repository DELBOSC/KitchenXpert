name: 🤖 AI Modules CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/ai-modules/**'
      - '.github/workflows/ai-modules-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/ai-modules/**'

jobs:
  lint-and-test:
    name: 🔍 Lint & Test AI Modules
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8.15.0'

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run ESLint
        run: pnpm --filter ai-modules lint

      - name: 📝 TypeScript type check
        run: pnpm --filter ai-modules type-check

      - name: 🧪 Run unit tests
        run: pnpm --filter ai-modules test

  build:
    name: 🏗️ Build AI Modules
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8.15.0'

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build AI modules
        run: pnpm --filter ai-modules build

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-modules-build
          path: packages/ai-modules/dist
          retention-days: 7
