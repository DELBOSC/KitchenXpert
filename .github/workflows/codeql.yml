name: 🔒 CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run at 3 AM every Monday
    - cron: '0 3 * * 1'

jobs:
  analyze:
    name: 🔍 Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔒 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v3

      # analyze@v3 UPLOADS THE RESULTS ITSELF ("Successfully uploaded results").
      # Do NOT add an upload-sarif step after it: the one that used to live here
      # pointed at ./results — a directory that never existed — and, being
      # `if: always()`, it turned a FULLY SUCCESSFUL scan red on every single run
      # since February. 30/30 failures. The red was read as "CodeQL is broken",
      # the docs froze that reading as "BLOCKED — Advanced Security required", and
      # nobody opened the Security tab. 246 alerts (4 HIGH) had been waiting there
      # for five months. The detector was shouting into an empty room.
      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

      - name: 📝 Summary
        if: always()
        run: |
          echo "## 🔒 CodeQL Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Language:** ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the Security tab for detailed results." >> $GITHUB_STEP_SUMMARY
