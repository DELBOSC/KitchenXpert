# Auto-labeling configuration for Pull Requests
# Syntax: actions/labeler@v5 (changed-files + any-glob-to-any-file)

# Frontend
frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/frontend/**/*'
          - 'packages/ui-components/**/*'
          - 'packages/design-system/**/*'

# Backend
backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/backend/**/*'
          - 'packages/api-client/**/*'

# 3D Engine
3d-engine:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/3d-engine/**/*'

# Common
common:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/common/**/*'

# Catalog Providers
catalog:
  - changed-files:
      - any-glob-to-any-file:
          - 'catalog-providers/**/*'

# AI Modules
ai:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/ai-modules/**/*'

# Configuration
config:
  - changed-files:
      - any-glob-to-any-file:
          - 'config/**/*'
          - '*.config.js'
          - '*.config.ts'

# CI/CD
ci-cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**/*'
          - '.github/dependabot.yml'

# Documentation
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**/*'

# Tests
tests:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.ts'
          - '**/*.test.tsx'
          - '**/*.spec.ts'
          - '**/*.spec.tsx'
          - 'packages/*/tests/**/*'

# Dependencies
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'pnpm-lock.yaml'
          - 'packages/*/package.json'

# Docker
docker:
  - changed-files:
      - any-glob-to-any-file:
          - '**/Dockerfile*'
          - '**/docker-compose*.yml'
          - 'config/docker/**/*'

# Database
database:
  - changed-files:
      - any-glob-to-any-file:
          - 'migrations/**/*'
          - 'seeds/**/*'
          - 'config/database/**/*'

# Security
security:
  - changed-files:
      - any-glob-to-any-file:
          - 'config/security/**/*'
          - 'packages/backend/src/auth/**/*'
          - '.github/SECURITY.md'
